<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080604">
<title>SP-404 Jazz Hip-Hop</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --gap: 4px;
}

html { height: 100%; }

/* ── Mobile-first: full-screen layout ───────────────────── */
body {
  background: #080604;
  color: #e0d4b8;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  padding: var(--safe-top) var(--gap) var(--safe-bot);
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

/* ── Machine shell ──────────────────────────────────────── */
.machine {
  background: linear-gradient(160deg, #1c1710 0%, #0f0c07 60%, #0a0804 100%);
  border-radius: 10px;
  padding: 8px 8px 0;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  padding-bottom: 6px;
  flex-shrink: 0;
}
.brand {
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 5px;
  color: #f5a42a;
  text-shadow: 0 0 20px rgba(245,164,42,0.55);
  line-height: 1;
}
.model-line {
  font-size: 7px;
  letter-spacing: 2px;
  color: #6a5530;
  margin-top: 3px;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── LCD Display ────────────────────────────────────────── */
.display {
  background: #050f05;
  border: 1px solid #0e2a0e;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 10px;
  color: #3ddd3d;
  text-shadow: 0 0 10px rgba(61,221,61,0.7);
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  text-align: center;
  white-space: nowrap;
}

/* ── LED strip: hidden on mobile ────────────────────────── */
.led-strip { display: none; }
.led {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #150a04;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
  transition: all 0.08s ease;
}
.led.on { background: #ff5010; box-shadow: 0 0 8px rgba(255,80,16,0.9), 0 0 18px rgba(255,80,16,0.4); }

/* ── Section labels: hidden (don't take grid space) ─────── */
.section-label { display: none; }

/* ── Pad grid: fills all remaining height ───────────────── */
.pad-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 1fr;
  gap: var(--gap);
  flex: 1;
  min-height: 0;
  padding-bottom: var(--gap);
}

/* ── Pad base ───────────────────────────────────────────── */
.pad {
  border-radius: 7px;
  border: 2px solid transparent;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4px;
  min-height: 70px;
  transition: transform 0.06s ease, box-shadow 0.08s ease, background 0.08s ease, border-color 0.08s ease;
  position: relative;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.pad::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.2) 0%, transparent 65%);
  opacity: 0;
  transition: opacity 0.08s ease;
  pointer-events: none;
}
.pad.active::after { opacity: 1; }
.pad.active { transform: scale(0.92); }

/* Chord pads — green */
.pad.chord { background: linear-gradient(145deg, #182818 0%, #0f1c0f 100%); border-color: #243824; box-shadow: inset 0 2px 5px rgba(0,0,0,0.6); }
.pad.chord.active { background: linear-gradient(145deg, #253e25 0%, #1a2e1a 100%); border-color: #60ff60; box-shadow: 0 0 22px rgba(96,255,96,0.55), 0 0 50px rgba(96,255,96,0.2); }

/* FX pads — purple */
.pad.fx { background: linear-gradient(145deg, #271527 0%, #1a0d1a 100%); border-color: #3e1e3e; box-shadow: inset 0 2px 5px rgba(0,0,0,0.6); }
.pad.fx.active { background: linear-gradient(145deg, #3e1e3e 0%, #2c122c 100%); border-color: #ff60ff; box-shadow: 0 0 22px rgba(255,96,255,0.55), 0 0 50px rgba(255,96,255,0.2); }

/* Drum pads — orange */
.pad.drum { background: linear-gradient(145deg, #28180a 0%, #1c0f05 100%); border-color: #3e2208; box-shadow: inset 0 2px 5px rgba(0,0,0,0.6); }
.pad.drum.active { background: linear-gradient(145deg, #3e2208 0%, #2c1604 100%); border-color: #ffa020; box-shadow: 0 0 22px rgba(255,160,32,0.65), 0 0 50px rgba(255,160,32,0.25); }

/* Pad text */
.pad-name {
  font-size: clamp(9px, 3vw, 13px);
  font-weight: bold;
  letter-spacing: 0.3px;
  line-height: 1.2;
  pointer-events: none;
}
.pad-key { display: none; }

.chord .pad-name { color: #70ff70; }
.fx    .pad-name { color: #ff70ff; }
.drum  .pad-name { color: #ffaa30; }

/* ── Controls & Footer: hidden on mobile ────────────────── */
.controls { display: none; }
.knob-row { display: flex; gap: 12px; align-items: center; }
.knob-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.knob {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #2e2510, #130f06);
  border: 2px solid #3a2c10;
  position: relative;
  box-shadow: 0 2px 6px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,200,80,0.1);
}
.knob::after {
  content: '';
  position: absolute;
  top: 5px; left: 50%;
  transform: translateX(-50%);
  width: 2px; height: 8px;
  background: #f5a42a;
  border-radius: 1px;
}
.knob-label { font-size: 7px; color: #4a380e; letter-spacing: 1px; text-transform: uppercase; }
.key-hint { display: none; }
.footer { display: none; }

/* ── Desktop restore ────────────────────────────────────── */
@media (hover: hover) and (pointer: fine) and (min-width: 500px) {
  body {
    align-items: center;
    justify-content: center;
    height: auto;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 12px;
    overflow-x: hidden;
  }
  .machine {
    display: block;
    flex: none;
    border: 2px solid #2e2314;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 120px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,200,80,0.08);
    width: 100%;
    max-width: 560px;
  }
  .header { align-items: flex-start; margin-bottom: 16px; padding-bottom: 0; }
  .brand { font-size: 30px; letter-spacing: 8px; }
  .model-line { font-size: 8px; margin-top: 5px; }
  .display { font-size: 12px; padding: 6px 12px; min-width: 120px; }
  .led-strip { display: flex; gap: 5px; justify-content: center; margin: 10px 0 8px; }
  .section-label {
    display: block;
    font-size: 8px;
    letter-spacing: 3px;
    color: #42310e;
    text-align: center;
    padding: 7px 0 4px;
    text-transform: uppercase;
    grid-column: 1 / -1;
  }
  .pad-grid { grid-auto-rows: auto; gap: 8px; flex: none; min-height: auto; padding-bottom: 0; }
  .pad { aspect-ratio: 1; min-height: auto; border-radius: 8px; }
  .pad.chord:hover { border-color: #3a5e3a; }
  .pad.fx:hover    { border-color: #602060; }
  .pad.drum:hover  { border-color: #6a3a0e; }
  .pad-name { font-size: 10px; }
  .pad-key { display: block; font-size: 8px; opacity: 0.38; margin-top: 4px; letter-spacing: 1px; pointer-events: none; }
  .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid #1e1608; gap: 8px; }
  .key-hint { display: block; font-size: 8px; color: #3a2c10; line-height: 2; text-align: right; letter-spacing: 0.5px; }
  .footer { display: block; text-align: center; margin-top: 12px; font-size: 7px; color: #2e2208; letter-spacing: 2px; text-transform: uppercase; }
}
</style>
</head>
<body>
<div class="machine">

  <div class="header">
    <div>
      <div class="brand">SP-404</div>
      <div class="model-line">Jazz Hip-Hop · Web Audio</div>
    </div>
    <div class="display" id="display">[ READY ]</div>
  </div>

  <div class="led-strip">
    <div class="led" id="l0"></div><div class="led" id="l1"></div>
    <div class="led" id="l2"></div><div class="led" id="l3"></div>
    <div class="led" id="l4"></div><div class="led" id="l5"></div>
    <div class="led" id="l6"></div><div class="led" id="l7"></div>
  </div>

  <div class="pad-grid" id="padGrid"></div>

  <div class="controls">
    <div class="knob-row">
      <div class="knob-wrap"><div class="knob"></div><div class="knob-label">Reverb</div></div>
      <div class="knob-wrap"><div class="knob"></div><div class="knob-label">Lo-Fi</div></div>
      <div class="knob-wrap"><div class="knob"></div><div class="knob-label">Drive</div></div>
    </div>
    <div class="key-hint">
      Q W E R — chords 1~4<br>
      A S D F — chords 5~8<br>
      Z X C V — fx<br>
      1 2 3 4 — drums
    </div>
  </div>

  <div class="footer">SP-404 Style · Powered by Web Audio API</div>
</div>

<script>
// ─── Audio Context ────────────────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let ctx, masterOut, dryBus, wetBus, reverbNode;

function boot() {
  if (ctx) { if (ctx.state === 'suspended') ctx.resume(); return; }
  ctx = new AC();

  // Master tape saturation — vinyl warmth across all sounds
  const tapeSat = ctx.createWaveShaper();
  tapeSat.curve = tapeClip(1.6);
  tapeSat.oversample = '2x';
  tapeSat.connect(ctx.destination);

  masterOut = ctx.createGain();
  masterOut.gain.value = 0.80;
  masterOut.connect(tapeSat);

  // Jazz room reverb impulse
  const rate = ctx.sampleRate;
  const len  = Math.floor(rate * 2.8);
  const imp  = ctx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const d = imp.getChannelData(ch);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
  }
  reverbNode = ctx.createConvolver();
  reverbNode.buffer = imp;

  dryBus = ctx.createGain(); dryBus.gain.value = 0.65;
  wetBus = ctx.createGain(); wetBus.gain.value = 0.38;
  dryBus.connect(masterOut);
  wetBus.connect(reverbNode);
  reverbNode.connect(masterOut);
}

function distCurve(k) {
  const n = 256, c = new Float32Array(n), deg = Math.PI / 180;
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    c[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
  }
  return c;
}

// Tape saturation: tanh soft-clip — vinyl warmth
function tapeClip(drive) {
  const n = 512, c = new Float32Array(n), norm = Math.tanh(drive);
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    c[i] = Math.tanh(x * drive) / norm;
  }
  return c;
}

// ─── Chord Frequencies ────────────────────────────────────────────────────────
const semitone = (base, n) => base * Math.pow(2, n / 12);
const C3 = 130.81;
const nf = (root, ...intervals) => intervals.map(s => semitone(root, s));

const CHORDS = {
  //              root offsets from C3 (semitones)
  'Cmaj9':    nf(C3,  0, 16, 19, 23, 26),  // C3 E4 G4 B4 D5  — open, dreamy
  'Fmaj7#11': nf(C3,  5,  9, 12, 16, 23),  // F3 A3 C4 E4 B4  — Lydian jazz
  'Am9':      nf(C3, -3,  0,  4,  7, 11),  // A2 C3 E3 G3 B3  — minor 9
  'Dm9':      nf(C3,  2,  5,  9, 12, 16),  // D3 F3 A3 C4 E4  — smooth ii
  'G13':      nf(C3, -5, -1,  5,  9, 16),  // G2 B2 F3 A3 E4  — dominant 13
  'Ebmaj7':   nf(C3,  3,  7, 10, 14),      // Eb3 G3 Bb3 D4   — vintage
  'Bm7b5':    nf(C3, -1,  2,  5,  9),      // B2 D3 F3 A3     — half-dim
  'E7#9':     nf(C3,  4,  8, 11, 14, 19),  // E3 G#3 B3 D4 G4 — Hendrix
};

// Per-chord sound character
// dur=sustain(s), atk=attack(s), lpf=lowpass Hz, Q=resonance,
// rev=reverb send multiplier, det=unison detune cents, type=upper osc type
// dilla=true → tape wobble LFO (Dilla vintage feel)
const CHORD_CFG = {
  'Cmaj9':    { dur:3.2, atk:0.030, lpf:1850, Q:0.45, rev:1.40, det:11, type:'triangle' },
  'Fmaj7#11': { dur:2.4, atk:0.016, lpf:2800, Q:0.70, rev:0.75, det:7,  type:'triangle' },
  'Am9':      { dur:2.7, atk:0.024, lpf:2200, Q:0.55, rev:1.10, det:9,  type:'triangle' },
  'Dm9':      { dur:2.5, atk:0.020, lpf:2400, Q:0.60, rev:0.90, det:7,  type:'triangle' },
  'G13':      { dur:2.0, atk:0.010, lpf:3300, Q:0.85, rev:0.45, det:5,  type:'sawtooth' },
  'Ebmaj7':   { dur:1.6, atk:0.007, lpf:1500, Q:1.30, rev:0.28, det:15, type:'triangle', dilla:true },
  'Bm7b5':    { dur:2.9, atk:0.022, lpf:2000, Q:0.55, rev:1.20, det:8,  type:'triangle' },
  'E7#9':     { dur:2.3, atk:0.009, lpf:3900, Q:1.20, rev:0.18, det:3,  type:'sawtooth' },
};

function playChord(name) {
  boot();
  const freqs = CHORDS[name];
  const cfg   = CHORD_CFG[name] || {};
  const t     = ctx.currentTime;
  const dur   = cfg.dur || 2.2;
  const atk   = cfg.atk || 0.018;
  const det   = cfg.det || 6;
  const btype = cfg.type || 'triangle'; // upper note oscillator type

  // Volume scaled by sqrt(n) for perceptually consistent loudness
  const vol = 0.22 / Math.sqrt(freqs.length);
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + atk);
  env.gain.setValueAtTime(vol, t + dur * 0.42);
  env.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  const lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = cfg.lpf || 2800;
  lpf.Q.value = cfg.Q || 0.7;

  // Per-chord reverb send (multiplies global wetBus gain)
  const revSend = ctx.createGain();
  revSend.gain.value = cfg.rev || 0.65;

  env.connect(lpf);
  lpf.connect(dryBus);
  lpf.connect(revSend);
  revSend.connect(wetBus);

  // Dilla tape wobble — slow pitch LFO simulates vintage wow/flutter
  let lfoAmt = null;
  if (cfg.dilla) {
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 3.4 + Math.random() * 1.2; // 3.4–4.6 Hz wobble
    lfoAmt = ctx.createGain();
    lfoAmt.gain.value = 11; // ±11 cents
    lfo.connect(lfoAmt);
    lfo.start(t); lfo.stop(t + dur + 0.1);
  }

  freqs.forEach((freq, i) => {
    // Unison pair: dry + detuned copy for vintage thickness
    [0, det + (Math.random() - 0.5) * 3].forEach((d, di) => {
      const o = ctx.createOscillator();
      o.type = i === 0 ? 'sawtooth' : btype;
      o.frequency.value = freq;
      o.detune.value = d + (Math.random() - 0.5) * 3;
      if (lfoAmt) lfoAmt.connect(o.detune);
      const g = ctx.createGain();
      g.gain.value = di === 0 ? (i === 0 ? 0.80 : 0.60) : 0.30;
      o.connect(g); g.connect(env);
      o.start(t); o.stop(t + dur + 0.06);
    });
  });
}

// ─── Drums ────────────────────────────────────────────────────────────────────
function playKick() {
  boot();
  const t = ctx.currentTime;
  const body = ctx.createOscillator(); body.type = 'sine';
  body.frequency.setValueAtTime(190, t);
  body.frequency.exponentialRampToValueAtTime(44, t + 0.07);
  body.frequency.exponentialRampToValueAtTime(28, t + 0.22);

  const click = ctx.createOscillator(); click.type = 'triangle';
  click.frequency.setValueAtTime(1400, t);
  click.frequency.exponentialRampToValueAtTime(80, t + 0.018);

  const bg = ctx.createGain();
  bg.gain.setValueAtTime(1.4, t);
  bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
  const cg = ctx.createGain();
  cg.gain.setValueAtTime(0.65, t);
  cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);

  const ws = ctx.createWaveShaper(); ws.curve = distCurve(60);
  const comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -4; comp.ratio.value = 10;
  comp.attack.value = 0.001; comp.release.value = 0.12;

  body.connect(bg); click.connect(cg);
  bg.connect(ws); cg.connect(ws);
  ws.connect(comp); comp.connect(masterOut);
  body.start(t); body.stop(t + 0.45);
  click.start(t); click.stop(t + 0.05);
}

function playSnare() {
  boot();
  const t = ctx.currentTime;
  const nb = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.25), ctx.sampleRate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const ns = ctx.createBufferSource(); ns.buffer = nb;

  const nf2 = ctx.createBiquadFilter(); nf2.type = 'bandpass'; nf2.frequency.value = 2800; nf2.Q.value = 0.6;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.9, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);

  const osc = ctx.createOscillator(); osc.type = 'triangle';
  osc.frequency.setValueAtTime(230, t); osc.frequency.exponentialRampToValueAtTime(110, t + 0.06);
  const og = ctx.createGain();
  og.gain.setValueAtTime(0.5, t); og.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);

  const ws = ctx.createWaveShaper(); ws.curve = distCurve(28);
  ns.connect(nf2); nf2.connect(ng); ng.connect(ws);
  osc.connect(og); og.connect(ws); ws.connect(masterOut);
  ns.start(t); osc.start(t); osc.stop(t + 0.2);
}

function playHHClosed() {
  boot();
  const t = ctx.currentTime;
  const nb = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.1), ctx.sampleRate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const ns = ctx.createBufferSource(); ns.buffer = nb;
  const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 9000;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.55, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
  ns.connect(hpf); hpf.connect(g); g.connect(masterOut); ns.start(t);
}

function playHHOpen() {
  boot();
  const t = ctx.currentTime, dur = 0.55;
  const nb = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const ns = ctx.createBufferSource(); ns.buffer = nb;
  const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 6500;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.45, t);
  g.gain.linearRampToValueAtTime(0.18, t + 0.2);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  ns.connect(hpf); hpf.connect(g); g.connect(masterOut); ns.start(t);
}

// ─── FX ───────────────────────────────────────────────────────────────────────
function playVinylScratch() {
  boot();
  const t = ctx.currentTime;
  const osc = ctx.createOscillator(); osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(900, t);
  osc.frequency.linearRampToValueAtTime(280, t + 0.1);
  osc.frequency.linearRampToValueAtTime(1300, t + 0.22);
  osc.frequency.linearRampToValueAtTime(500, t + 0.35);
  const bpf = ctx.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = 1100; bpf.Q.value = 3.5;

  const nb = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.4), ctx.sampleRate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1) * 0.25;
  const ns = ctx.createBufferSource(); ns.buffer = nb;

  const ws = ctx.createWaveShaper(); ws.curve = distCurve(90);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.7, t + 0.02);
  g.gain.setValueAtTime(0.7, t + 0.33); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);

  osc.connect(bpf); bpf.connect(ws); ns.connect(ws);
  ws.connect(g); g.connect(dryBus); g.connect(wetBus);
  osc.start(t); osc.stop(t + 0.45); ns.start(t);
}

function playTapeStop() {
  boot();
  const t = ctx.currentTime, dur = 0.9;
  [261.63, 329.63, 392.00, 493.88].forEach(freq => {
    const osc = ctx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.04, t + dur);
    const lpf = ctx.createBiquadFilter(); lpf.type = 'lowpass';
    lpf.frequency.setValueAtTime(3500, t); lpf.frequency.exponentialRampToValueAtTime(80, t + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.22, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(lpf); lpf.connect(g); g.connect(dryBus);
    osc.start(t); osc.stop(t + dur + 0.05);
  });
}

function playLofiNoise() {
  boot();
  const t = ctx.currentTime, dur = 1.6, rate = ctx.sampleRate;
  const nb = ctx.createBuffer(1, Math.floor(rate * dur), rate);
  const nd = nb.getChannelData(0);
  let v = 0;
  for (let i = 0; i < nd.length; i++) {
    v += (Math.random() * 2 - 1) * 0.04;
    v = Math.max(-1, Math.min(1, v)); nd[i] = v;
  }
  const ns = ctx.createBufferSource(); ns.buffer = nb;
  const lpf = ctx.createBiquadFilter(); lpf.type = 'lowpass'; lpf.frequency.value = 700; lpf.Q.value = 1.8;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.55, t + 0.12);
  g.gain.setValueAtTime(0.55, t + dur - 0.22); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  ns.connect(lpf); lpf.connect(g); g.connect(dryBus); g.connect(wetBus); ns.start(t);
}

function playRecordCrackle() {
  boot();
  const t = ctx.currentTime, dur = 2.2, rate = ctx.sampleRate;
  const nb = ctx.createBuffer(1, Math.floor(rate * dur), rate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) {
    nd[i] = (Math.random() * 2 - 1) * 0.05;
    if (Math.random() < 0.0012) {
      const pl = Math.floor(Math.random() * 90 + 18);
      const amp = Math.random() * 0.9 + 0.15;
      for (let j = 0; j < pl && i + j < nd.length; j++)
        nd[i + j] += Math.sin((j / pl) * Math.PI) * amp * (Math.random() * 2 - 1);
    }
  }
  const ns = ctx.createBufferSource(); ns.buffer = nb;
  const bpf = ctx.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = 3200; bpf.Q.value = 0.45;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.65, t); g.gain.setValueAtTime(0.65, t + dur - 0.15);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  ns.connect(bpf); bpf.connect(g); g.connect(masterOut); ns.start(t);
}

// ─── Pad definitions ──────────────────────────────────────────────────────────
const PADS = [
  { name:'Cmaj9',      type:'chord', key:'q', fn:()=>playChord('Cmaj9')    },
  { name:'Fmaj7\n#11', type:'chord', key:'w', fn:()=>playChord('Fmaj7#11') },
  { name:'Am9',        type:'chord', key:'e', fn:()=>playChord('Am9')      },
  { name:'Dm9',        type:'chord', key:'r', fn:()=>playChord('Dm9')      },
  { name:'G13',        type:'chord', key:'a', fn:()=>playChord('G13')      },
  { name:'Ebmaj7',     type:'chord', key:'s', fn:()=>playChord('Ebmaj7')   },
  { name:'Bm7b5',      type:'chord', key:'d', fn:()=>playChord('Bm7b5')    },
  { name:'E7\n#9',     type:'chord', key:'f', fn:()=>playChord('E7#9')     },
  { name:'VINYL\nSCRATCH',  type:'fx',   key:'z', fn:playVinylScratch  },
  { name:'TAPE\nSTOP',      type:'fx',   key:'x', fn:playTapeStop      },
  { name:'LOFI\nNOISE',     type:'fx',   key:'c', fn:playLofiNoise     },
  { name:'RECORD\nCRACKLE', type:'fx',   key:'v', fn:playRecordCrackle },
  { name:'KICK',        type:'drum', key:'1', fn:playKick     },
  { name:'SNARE',       type:'drum', key:'2', fn:playSnare    },
  { name:'HH\nCLOSED',  type:'drum', key:'3', fn:playHHClosed },
  { name:'HH\nOPEN',    type:'drum', key:'4', fn:playHHOpen   },
];

// ─── Build DOM ────────────────────────────────────────────────────────────────
const grid    = document.getElementById('padGrid');
const display = document.getElementById('display');
const leds    = Array.from({length:8}, (_,i) => document.getElementById(`l${i}`));
const padEls  = [];
const SECTION = { 0:'— Chords —', 8:'— Effects —', 12:'— Drums —' };
const DNAMES  = PADS.map(p => p.name.replace('\n',' '));

PADS.forEach((pad, i) => {
  if (SECTION[i]) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = SECTION[i];
    grid.appendChild(lbl);
  }
  const el = document.createElement('div');
  el.className = `pad ${pad.type}`;
  el.innerHTML =
    `<span class="pad-name">${pad.name.replace('\n','<br>')}</span>` +
    `<span class="pad-key">[${pad.key.toUpperCase()}]</span>`;
  el.addEventListener('mousedown', e => { e.preventDefault(); trigger(i); });
  el.addEventListener('touchstart', e => { e.preventDefault(); trigger(i); }, {passive:false});
  grid.appendChild(el);
  padEls.push(el);
});

// ─── Trigger ──────────────────────────────────────────────────────────────────
function trigger(idx) {
  boot();
  PADS[idx].fn();
  display.textContent = `[ ${DNAMES[idx]} ]`;
  const led = leds[idx % 8];
  led.classList.add('on');
  setTimeout(() => led.classList.remove('on'), 160);
  padEls[idx].classList.add('active');
  setTimeout(() => padEls[idx].classList.remove('active'), 160);
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
const keyMap = Object.fromEntries(PADS.map((p,i) => [p.key, i]));
document.addEventListener('keydown', e => {
  if (e.repeat || e.ctrlKey || e.metaKey) return;
  const k = e.key.toLowerCase();
  if (k in keyMap) { e.preventDefault(); trigger(keyMap[k]); }
});
</script>
