<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ede7db">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>BCT-404</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --gap: 4px;
}

html { height: 100%; }

body {
  background: #ede7db;
  color: #2a1a08;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  padding: var(--safe-top) var(--gap) var(--safe-bot);
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

/* ── Machine shell ── */
.machine {
  background: linear-gradient(160deg, #eae2d6 0%, #ddd5c8 100%);
  border: 2px solid #c4b499;
  border-radius: 14px;
  padding: 8px 8px 0;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.7);
}

/* ── Header ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  padding-bottom: 6px;
  flex-shrink: 0;
}
.brand {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 6px;
  color: #1a1208;
  text-shadow: 0 1px 0 rgba(255,255,255,0.6), 0 -1px 0 rgba(0,0,0,0.08);
  line-height: 1;
}
.model-line {
  font-size: 7px;
  letter-spacing: 2px;
  color: #8a7456;
  margin-top: 3px;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── LCD Display ── */
.display {
  background: #050f05;
  border: 1px solid #0e2a0e;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 10px;
  color: #3ddd3d;
  text-shadow: 0 0 10px rgba(61,221,61,0.7);
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  text-align: center;
  white-space: nowrap;
}

/* ── LED strip ── */
.led-strip { display: none; }
.led {
  width: 6px; height: 6px; border-radius: 50%;
  background: #c8b898; box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
  transition: all 0.08s ease;
}
.led.on { background: #ff5010; box-shadow: 0 0 8px rgba(255,80,16,0.9); }

/* ── Section labels ── */
.section-label { display: none; }

/* ── Pad grid ── */
.pad-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 1fr;
  gap: var(--gap);
  flex: 1;
  min-height: 0;
  padding-bottom: var(--gap);
}

/* ── Pad base ── */
.pad {
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4px;
  min-height: 70px;
  position: relative;
  overflow: hidden;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.06s ease, box-shadow 0.06s ease;
}
.pad::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 40% 30%, rgba(255,255,255,0.35) 0%, transparent 60%);
  opacity: 1;
  pointer-events: none;
}
.pad.active { transform: scale(0.93) translateY(2px); }

/* Chord pads — mint/sage */
.pad.chord {
  background: linear-gradient(155deg, #c4e8c8 0%, #a8d4b0 100%);
  border-color: #84c090;
  box-shadow: 0 3px 0 rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.5);
  color: #1a5224;
}
.pad.chord.active {
  background: linear-gradient(155deg, #80c888 0%, #64b870 100%);
  border-color: #38a048;
  box-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 0 14px rgba(50,170,70,0.35);
}

/* FX pads — amber/warm yellow */
.pad.fx {
  background: linear-gradient(155deg, #f0d870 0%, #e0c050 100%);
  border-color: #c4a028;
  box-shadow: 0 3px 0 rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.5);
  color: #4a3000;
}
.pad.fx.active {
  background: linear-gradient(155deg, #d4a820 0%, #c49810 100%);
  border-color: #a07800;
  box-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 0 14px rgba(200,150,0,0.35);
}

/* Drum pads — terracotta/coral */
.pad.drum {
  background: linear-gradient(155deg, #e8b490 0%, #d49c74 100%);
  border-color: #b47858;
  box-shadow: 0 3px 0 rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.5);
  color: #4a1800;
}
.pad.drum.active {
  background: linear-gradient(155deg, #c47050 0%, #b46040 100%);
  border-color: #904030;
  box-shadow: 0 1px 0 rgba(0,0,0,0.1), 0 0 14px rgba(180,80,40,0.35);
}

/* Pad text */
.pad-name {
  font-size: clamp(9px, 2.8vw, 13px);
  font-weight: bold;
  letter-spacing: 0.3px;
  line-height: 1.2;
  pointer-events: none;
}
.pad-hint {
  font-size: 6px;
  letter-spacing: 1px;
  opacity: 0.35;
  margin-top: 2px;
  pointer-events: none;
  text-transform: uppercase;
}
.pad-key { display: none; }

/* ── Controls & Footer ── */
.controls { display: none; }
.knob-row { display: flex; gap: 12px; align-items: center; }
.knob-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.knob {
  width: 32px; height: 32px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #d4c8b0, #a09070);
  border: 2px solid #b4a080; position: relative;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.knob::after {
  content: ''; position: absolute; top: 5px; left: 50%;
  transform: translateX(-50%); width: 2px; height: 8px;
  background: #1a1208; border-radius: 1px;
}
.knob-label { font-size: 7px; color: #8a7456; letter-spacing: 1px; text-transform: uppercase; }
.key-hint { display: none; }
.footer { display: none; }

/* ── Picker overlay ── */
.picker-overlay {
  position: fixed; inset: 0;
  background: rgba(10,8,4,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(2px);
}
.picker-overlay.hidden { display: none; }

.picker-modal {
  background: #18120a;
  border: 2px solid #f5a42a;
  border-radius: 14px;
  padding: 18px 16px 16px;
  width: min(300px, 88vw);
  box-shadow: 0 0 40px rgba(245,164,42,0.25), 0 20px 60px rgba(0,0,0,0.6);
}

.picker-title {
  color: #f5a42a;
  font-size: 10px;
  letter-spacing: 4px;
  text-align: center;
  margin-bottom: 14px;
  text-shadow: 0 0 10px rgba(245,164,42,0.5);
}

/* Drums row: labels + scrollable drums */
.picker-cols {
  display: flex;
  gap: 10px;
  position: relative;
}

.picker-col {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.picker-label {
  font-size: 8px;
  letter-spacing: 3px;
  color: #6a5530;
  text-align: center;
  padding-bottom: 6px;
  flex-shrink: 0;
  height: 22px;
}

.picker-drum-wrap {
  position: relative;
  height: 176px; /* 4 visible items */
  overflow: hidden;
}

/* gradient fades top/bottom */
.picker-drum-wrap::before,
.picker-drum-wrap::after {
  content: '';
  position: absolute; left: 0; right: 0;
  height: 55px;
  pointer-events: none; z-index: 3;
}
.picker-drum-wrap::before {
  top: 0;
  background: linear-gradient(to bottom, #18120a 10%, transparent 100%);
}
.picker-drum-wrap::after {
  bottom: 0;
  background: linear-gradient(to top, #18120a 10%, transparent 100%);
}

.picker-drum {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
  -ms-overflow-style: none;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
.picker-drum::-webkit-scrollbar { display: none; }

.picker-item {
  height: 44px;
  scroll-snap-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  font-weight: bold;
  color: rgba(160,120,60,0.35);
  transform: scale(0.78);
  transition: color 0.12s, transform 0.12s;
  cursor: pointer;
}
.picker-item.pi-near  { color: rgba(200,155,80,0.65); transform: scale(0.9); }
.picker-item.pi-sel   { color: #f5e0a0; transform: scale(1.08); }
.picker-item.picker-pad { pointer-events: none; }

/* FX picker mode: hide chord columns, show fx column */
.chord-only { display: flex; }
.fx-only    { display: none; }
.picker-cols.fx-mode .chord-only { display: none; }
.picker-cols.fx-mode .fx-only    { display: flex; }

/* selector bar — centered vertically in drum-wrap */
.picker-sel-bar {
  position: absolute;
  left: 0; right: 0;
  top: 50%; height: 44px;
  transform: translateY(-50%);
  border-top: 1px solid rgba(245,164,42,0.45);
  border-bottom: 1px solid rgba(245,164,42,0.45);
  pointer-events: none; z-index: 2;
}

.picker-btns {
  display: flex; gap: 8px; margin-top: 14px;
}
.picker-btn {
  flex: 1; padding: 10px 0;
  border-radius: 7px; border: none;
  font-family: 'Courier New', monospace;
  font-size: 10px; letter-spacing: 2px; font-weight: bold;
  cursor: pointer;
}
.picker-btn.cancel  { background: #2a1e0e; color: #6a5530; border: 1px solid #3a2a10; }
.picker-btn.confirm { background: #f5a42a; color: #0a0804; }

/* ── Desktop restore ── */
@media (hover: hover) and (pointer: fine) and (min-width: 500px) {
  body {
    align-items: center; justify-content: center;
    height: auto; min-height: 100vh; min-height: 100dvh;
    padding: 12px; overflow-x: hidden;
  }
  .machine {
    display: block; flex: none;
    border-radius: 20px; padding: 24px;
    width: 100%; max-width: 560px;
  }
  .header { align-items: flex-start; margin-bottom: 16px; padding-bottom: 0; }
  .brand { font-size: 28px; letter-spacing: 8px; }
  .model-line { font-size: 8px; margin-top: 5px; }
  .display { font-size: 12px; padding: 6px 12px; min-width: 120px; }
  .led-strip { display: flex; gap: 5px; justify-content: center; margin: 10px 0 8px; }
  .section-label {
    display: block; font-size: 8px; letter-spacing: 3px;
    color: #8a7456; text-align: center;
    padding: 7px 0 4px; text-transform: uppercase; grid-column: 1 / -1;
  }
  .pad-grid { grid-auto-rows: auto; gap: 8px; flex: none; min-height: auto; padding-bottom: 0; }
  .pad { aspect-ratio: 1; min-height: auto; }
  .pad.chord:hover { border-color: #50a860; }
  .pad.fx:hover    { border-color: #e0a820; }
  .pad.drum:hover  { border-color: #c07050; }
  .pad-name { font-size: 10px; }
  .pad-hint { display: none; }
  .pad-key { display: block; font-size: 8px; opacity: 0.38; margin-top: 4px; letter-spacing: 1px; pointer-events: none; }
  .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid #c8b898; gap: 8px; }
  .key-hint { display: block; font-size: 8px; color: #8a7456; line-height: 2; text-align: right; letter-spacing: 0.5px; }
  .footer { display: block; text-align: center; margin-top: 12px; font-size: 7px; color: #a09070; letter-spacing: 2px; text-transform: uppercase; }
}
</style>
</head>
<body>
<div class="machine">
  <div class="header">
    <div>
      <div class="brand">BCT-404</div>
      <div class="model-line">Jazz Hip-Hop · Web Audio</div>
    </div>
    <div class="display" id="display">[ READY ]</div>
  </div>

  <div class="led-strip">
    <div class="led" id="l0"></div><div class="led" id="l1"></div>
    <div class="led" id="l2"></div><div class="led" id="l3"></div>
    <div class="led" id="l4"></div><div class="led" id="l5"></div>
    <div class="led" id="l6"></div><div class="led" id="l7"></div>
  </div>

  <div class="pad-grid" id="padGrid"></div>

  <div class="controls">
    <div class="knob-row">
      <div class="knob-wrap"><div class="knob"></div><div class="knob-label">Reverb</div></div>
      <div class="knob-wrap"><div class="knob"></div><div class="knob-label">Lo-Fi</div></div>
      <div class="knob-wrap"><div class="knob"></div><div class="knob-label">Drive</div></div>
    </div>
    <div class="key-hint">
      Q W E R — chords 1~4<br>
      A S D F — chords 5~8<br>
      Z X C V — fx<br>
      1 2 3 4 — drums
    </div>
  </div>
  <div class="footer">BCT-404 · Jazz Hip-Hop · Web Audio API</div>
</div>

<!-- Chord editor picker -->
<div id="pickerOverlay" class="picker-overlay hidden">
  <div class="picker-modal">
    <div class="picker-title" id="pickerTitle">── EDIT PAD ──</div>
    <div class="picker-cols">
      <div class="picker-col chord-only">
        <div class="picker-label">ROOT</div>
        <div class="picker-drum-wrap">
          <div class="picker-drum" id="rootDrum"></div>
          <div class="picker-sel-bar"></div>
        </div>
      </div>
      <div class="picker-col chord-only">
        <div class="picker-label">TYPE</div>
        <div class="picker-drum-wrap">
          <div class="picker-drum" id="typeDrum"></div>
          <div class="picker-sel-bar"></div>
        </div>
      </div>
      <div class="picker-col fx-only">
        <div class="picker-label">SOUND</div>
        <div class="picker-drum-wrap">
          <div class="picker-drum" id="fxDrum"></div>
          <div class="picker-sel-bar"></div>
        </div>
      </div>
    </div>
    <div class="picker-btns">
      <button class="picker-btn cancel" id="pickerCancel">CANCEL</button>
      <button class="picker-btn confirm" id="pickerConfirm">SAVE</button>
    </div>
  </div>
</div>

<script>
// ─── Audio Context ────────────────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let ctx, masterOut, dryBus, wetBus, reverbNode;

function boot() {
  if (ctx) { if (ctx.state === 'suspended') ctx.resume(); return; }
  ctx = new AC();

  const tapeSat = ctx.createWaveShaper();
  tapeSat.curve = tapeClip(1.6);
  tapeSat.oversample = '2x';
  tapeSat.connect(ctx.destination);

  masterOut = ctx.createGain();
  masterOut.gain.value = 0.80;
  masterOut.connect(tapeSat);

  const rate = ctx.sampleRate, len = Math.floor(rate * 2.8);
  const imp = ctx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const d = imp.getChannelData(ch);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
  }
  reverbNode = ctx.createConvolver();
  reverbNode.buffer = imp;

  dryBus = ctx.createGain(); dryBus.gain.value = 0.65;
  wetBus = ctx.createGain(); wetBus.gain.value = 0.38;
  dryBus.connect(masterOut);
  wetBus.connect(reverbNode);
  reverbNode.connect(masterOut);
}

function distCurve(k) {
  const n = 256, c = new Float32Array(n), deg = Math.PI / 180;
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    c[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
  }
  return c;
}

function tapeClip(drive) {
  const n = 512, c = new Float32Array(n), norm = Math.tanh(drive);
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    c[i] = Math.tanh(x * drive) / norm;
  }
  return c;
}

// ─── Chord System ─────────────────────────────────────────────────────────────
const semitone = (base, n) => base * Math.pow(2, n / 12);
const C3 = 130.81;

// Root notes (flats for jazz convention)
const ROOTS = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

// Chord types (jazz notation)
const TYPES = ['maj','m','maj7','m7','maj9','m9','7','m7b5','maj7#11','13','7#9','dim','aug'];

// Intervals from bass root — open jazz voicings
const CHORD_INTERVALS = {
  'maj':     [0, 16, 19],
  'm':       [0, 15, 19],
  'maj7':    [0, 16, 19, 23],
  'm7':      [0, 15, 19, 22],
  'maj9':    [0, 16, 19, 23, 26],
  'm9':      [0, 15, 19, 22, 26],
  '7':       [0, 16, 19, 22],
  'm7b5':    [0, 15, 18, 22],
  'maj7#11': [0, 16, 19, 23, 30],
  '13':      [0, 16, 22, 26, 33],
  '7#9':     [0, 16, 19, 22, 27],
  'dim':     [0, 15, 18, 21],
  'aug':     [0, 16, 20],
};

function buildFreqs(rootIdx, typeKey) {
  // Bass in C2-C3 area: roots 0-5 stay in C3 octave, 6-11 shift down
  const offset = rootIdx <= 5 ? rootIdx : rootIdx - 12;
  const bass = semitone(C3, offset);
  return (CHORD_INTERVALS[typeKey] || [0,16,19,23]).map(iv => semitone(bass, iv));
}

function chordName(rootIdx, typeKey) {
  return ROOTS[rootIdx] + typeKey;
}

// Mutable chord state for each of the 8 chord pads
const padChords = [
  {r:0,  t:'maj9'},    // Cmaj9
  {r:5,  t:'maj7#11'}, // Fmaj7#11
  {r:9,  t:'m9'},      // Am9
  {r:2,  t:'m9'},      // Dm9
  {r:7,  t:'13'},      // G13
  {r:3,  t:'maj7'},    // Ebmaj7
  {r:11, t:'m7b5'},    // Bm7b5
  {r:4,  t:'7#9'},     // E7#9
];

// Per-chord sound configs (keyed by chord name)
const CHORD_CFG = {
  'Cmaj9':    { dur:3.2, atk:0.030, lpf:1850, Q:0.45, rev:1.40, det:11, type:'triangle' },
  'Fmaj7#11': { dur:2.4, atk:0.016, lpf:2800, Q:0.70, rev:0.75, det:7,  type:'triangle' },
  'Am9':      { dur:2.7, atk:0.024, lpf:2200, Q:0.55, rev:1.10, det:9,  type:'triangle' },
  'Dm9':      { dur:2.5, atk:0.020, lpf:2400, Q:0.60, rev:0.90, det:7,  type:'triangle' },
  'G13':      { dur:2.0, atk:0.010, lpf:3300, Q:0.85, rev:0.45, det:5,  type:'sawtooth' },
  'Ebmaj7':   { dur:1.6, atk:0.007, lpf:1500, Q:1.30, rev:0.28, det:15, type:'triangle', dilla:true },
  'Bm7b5':    { dur:2.9, atk:0.022, lpf:2000, Q:0.55, rev:1.20, det:8,  type:'triangle' },
  'E7#9':     { dur:2.3, atk:0.009, lpf:3900, Q:1.20, rev:0.18, det:3,  type:'sawtooth' },
};
const DEFAULT_CFG = { dur:2.5, atk:0.018, lpf:2400, Q:0.65, rev:0.80, det:7, type:'triangle' };

// ─── FX Sound Library ─────────────────────────────────────────────────────────
const FX_SOUNDS = [
  { name:'VINYL SCRATCH',  padName:'VINYL\nSCRATCH',  fn: playVinylScratch  },
  { name:'TAPE STOP',      padName:'TAPE\nSTOP',      fn: playTapeStop      },
  { name:'LOFI NOISE',     padName:'LOFI\nNOISE',     fn: playLofiNoise     },
  { name:'RECORD CRACKLE', padName:'RECORD\nCRACKLE', fn: playRecordCrackle },
  { name:'REWIND',         padName:'REWIND',          fn: playRewind        },
  { name:'CASSETTE CLICK', padName:'CASSETTE\nCLICK', fn: playCassetteClick },
  { name:'RADIO STATIC',   padName:'RADIO\nSTATIC',   fn: playRadioStatic   },
  { name:'VINYL DROP',     padName:'VINYL\nDROP',     fn: playVinylDrop     },
  { name:'TAPE HISS',      padName:'TAPE\nHISS',      fn: playTapeHiss      },
  { name:'PITCH DOWN',     padName:'PITCH\nDOWN',     fn: playPitchDown     },
  { name:'AYE',            padName:'AYE',             fn: ()=>speakCool('aye')      },
  { name:'SKRRT',          padName:'SKRRT',           fn: ()=>speakCool('skrrt')    },
  { name:'DRIP',           padName:'DRIP',            fn: ()=>speakCool('drip')     },
  { name:'NO CAP',         padName:'NO\nCAP',         fn: ()=>speakCool('no cap')   },
  { name:'FACTS',          padName:'FACTS',           fn: ()=>speakCool('facts')    },
  { name:'SHEESH',         padName:'SHEESH',          fn: ()=>speakCool('sheesh')   },
  { name:'BUSSIN',         padName:'BUSSIN',          fn: ()=>speakCool('bussin')   },
  { name:'VIBE',           padName:'VIBE',            fn: ()=>speakCool('vibe')     },
  { name:'LOWKEY',         padName:'LOWKEY',          fn: ()=>speakCool('lowkey')   },
  { name:'BIG FACTS',      padName:'BIG\nFACTS',      fn: ()=>speakCool('big facts')},
];

// Which FX_SOUNDS index each of the 4 FX pads is assigned to
const padFX = [0, 1, 2, 3];

function playFX(fxPadIdx) {
  boot();

// ─── Monophonic chord engine ───────────────────────────────────────────────────
let activeChordEnv = null;

function stopActiveChord(fadeMs = 350) {
  if (!activeChordEnv || !ctx) return;
  const t = ctx.currentTime;
  try {
    activeChordEnv.gain.cancelScheduledValues(t);
    activeChordEnv.gain.setValueAtTime(activeChordEnv.gain.value, t);
    activeChordEnv.gain.exponentialRampToValueAtTime(0.0001, t + fadeMs / 1000);
  } catch(e) {}
  activeChordEnv = null;
}

function playChord(padIdx) {
  boot();
  stopActiveChord();

  const pc    = padChords[padIdx];
  const freqs = buildFreqs(pc.r, pc.t);
  const name  = chordName(pc.r, pc.t);
  const cfg   = CHORD_CFG[name] || DEFAULT_CFG;
  const t     = ctx.currentTime;
  const dur   = cfg.dur, atk = cfg.atk, det = cfg.det;
  const btype = cfg.type;

  const vol = 0.22 / Math.sqrt(freqs.length);
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + atk);
  env.gain.setValueAtTime(vol, t + dur * 0.42);
  env.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  activeChordEnv = env;

  const lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = cfg.lpf;
  lpf.Q.value = cfg.Q;

  const revSend = ctx.createGain();
  revSend.gain.value = cfg.rev;

  env.connect(lpf);
  lpf.connect(dryBus);
  lpf.connect(revSend);
  revSend.connect(wetBus);

  // Dilla tape wobble LFO
  let lfoAmt = null;
  if (cfg.dilla) {
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 3.4 + Math.random() * 1.2;
    lfoAmt = ctx.createGain();
    lfoAmt.gain.value = 11;
    lfo.connect(lfoAmt);
    lfo.start(t); lfo.stop(t + dur + 0.1);
  }

  freqs.forEach((freq, i) => {
    [0, det + (Math.random() - 0.5) * 3].forEach((d, di) => {
      const o = ctx.createOscillator();
      o.type = i === 0 ? 'sawtooth' : btype;
      o.frequency.value = freq;
      o.detune.value = d + (Math.random() - 0.5) * 3;
      if (lfoAmt) lfoAmt.connect(o.detune);
      const g = ctx.createGain();
      g.gain.value = di === 0 ? (i === 0 ? 0.80 : 0.60) : 0.30;
      o.connect(g); g.connect(env);
      o.start(t); o.stop(t + dur + 0.06);
    });
  });
}

// ─── Drums ────────────────────────────────────────────────────────────────────
function playKick() {
  boot();
  const t = ctx.currentTime;
  const body = ctx.createOscillator(); body.type = 'sine';
  body.frequency.setValueAtTime(190, t);
  body.frequency.exponentialRampToValueAtTime(44, t + 0.07);
  body.frequency.exponentialRampToValueAtTime(28, t + 0.22);

  const click = ctx.createOscillator(); click.type = 'triangle';
  click.frequency.setValueAtTime(1400, t);
  click.frequency.exponentialRampToValueAtTime(80, t + 0.018);

  const bg = ctx.createGain();
  bg.gain.setValueAtTime(1.4, t);
  bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
  const cg = ctx.createGain();
  cg.gain.setValueAtTime(0.65, t);
  cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);

  const ws = ctx.createWaveShaper(); ws.curve = distCurve(60);
  const comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -4; comp.ratio.value = 10;
  comp.attack.value = 0.001; comp.release.value = 0.12;

  body.connect(bg); click.connect(cg);
  bg.connect(ws); cg.connect(ws);
  ws.connect(comp); comp.connect(masterOut);
  body.start(t); body.stop(t + 0.45);
  click.start(t); click.stop(t + 0.05);
}

function playSnare() {
  boot();
  const t = ctx.currentTime;
  const nb = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.25), ctx.sampleRate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const ns = ctx.createBufferSource(); ns.buffer = nb;

  const nf2 = ctx.createBiquadFilter(); nf2.type = 'bandpass'; nf2.frequency.value = 2800; nf2.Q.value = 0.6;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.9, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);

  const osc = ctx.createOscillator(); osc.type = 'triangle';
  osc.frequency.setValueAtTime(230, t); osc.frequency.exponentialRampToValueAtTime(110, t + 0.06);
  const og = ctx.createGain();
  og.gain.setValueAtTime(0.5, t); og.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);

  const ws = ctx.createWaveShaper(); ws.curve = distCurve(28);
  ns.connect(nf2); nf2.connect(ng); ng.connect(ws);
  osc.connect(og); og.connect(ws); ws.connect(masterOut);

function playRecordCrackle() {
  boot();
  const t = ctx.currentTime, dur = 2.2, rate = ctx.sampleRate;
  const nb = ctx.createBuffer(1, Math.floor(rate * dur), rate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) {
    nd[i] = (Math.random() * 2 - 1) * 0.05;
    if (Math.random() < 0.0012) {
      const pl = Math.floor(Math.random() * 90 + 18), amp = Math.random() * 0.9 + 0.15;
      for (let j = 0; j < pl && i + j < nd.length; j++)
        nd[i + j] += Math.sin((j / pl) * Math.PI) * amp * (Math.random() * 2 - 1);
    }
  }
  const ns = ctx.createBufferSource(); ns.buffer = nb;
  const bpf = ctx.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = 3200; bpf.Q.value = 0.45;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.325, t); g.gain.setValueAtTime(0.325, t + dur - 0.15);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  ns.connect(bpf); bpf.connect(g); g.connect(masterOut); ns.start(t);
}

let _voices = [];
function _loadVoices() { _voices = speechSynthesis.getVoices(); }
if (window.speechSynthesis) {
  _loadVoices();
  speechSynthesis.addEventListener('voiceschanged', _loadVoices);

function speakCool(text) {
  if (!window.speechSynthesis) return;
  boot();
  const u = new SpeechSynthesisUtterance(text);
  u.pitch = 0.55; u.rate = 0.78; u.volume = 0.85;
  const voices = _voices.length ? _voices : speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && /male/i.test(v.name))
    || voices.find(v => v.lang.startsWith('en'))
    || voices[0];
  if (enVoice) u.voice = enVoice;
  // Subtle autotune flourish — Am minor 7th arpeggio
  const t = ctx.currentTime;
  [220, 261.63, 311.13, 349.23].forEach((freq, i) => {
    const o = ctx.createOscillator(); o.type = 'sine';
    o.frequency.value = freq;
    const g = ctx.createGain();
    const s = t + i * 0.065;
    g.gain.setValueAtTime(0, s);
    g.gain.linearRampToValueAtTime(0.052, s + 0.022);
    g.gain.exponentialRampToValueAtTime(0.0001, s + 0.24);
    o.connect(g); g.connect(dryBus);
    o.start(s); o.stop(s + 0.28);
  });
  speechSynthesis.speak(u);
}

  { name:'SNARE',       type:'drum', key:'2', fn:playSnare    },
  { name:'HH\nCLOSED',  type:'drum', key:'3', fn:playHHClosed },
  { name:'HH\nOPEN',    type:'drum', key:'4', fn:playHHOpen   },
];

// Mutable display names (chord names change on edit)
const DNAMES = PADS.map(p => p.name.replace('\n',' '));

// ─── Build DOM ────────────────────────────────────────────────────────────────
const grid    = document.getElementById('padGrid');
const display = document.getElementById('display');
const leds    = Array.from({length:8}, (_,i) => document.getElementById(`l${i}`));
const padEls  = [];
const SECTION = { 0:'— Chords —', 8:'— Effects —', 12:'— Drums —' };

const LONG_PRESS_MS = 480;

PADS.forEach((pad, i) => {
  if (SECTION[i]) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = SECTION[i];
    grid.appendChild(lbl);
  }
  const el = document.createElement('div');
  el.className = `pad ${pad.type}`;
  el.innerHTML =
    `<span class="pad-name">${pad.name.replace('\n','<br>')}</span>` +
    (pad.type === 'chord' || pad.type === 'fx' ? `<span class="pad-hint">hold</span>` : '') +
    `<span class="pad-key">[${pad.key.toUpperCase()}]</span>`;
  grid.appendChild(el);
  padEls.push(el);

  if (pad.type === 'chord') {
    // Per-touch-point tracking for independent multi-touch long-press
    const timers   = new Map(); // identifier → timeoutId
    const startPos = new Map(); // identifier → {x, y}

    el.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        startPos.set(id, {x: touch.clientX, y: touch.clientY});
        timers.set(id, setTimeout(() => {
          timers.delete(id);
          startPos.delete(id);
          openPicker(i);
        }, LONG_PRESS_MS));
      });
    }, {passive: false});

    el.addEventListener('touchmove', e => {
      // Only cancel if this specific touch moved > 10px
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        const sp = startPos.get(id);
        if (!sp) return;
        const dx = touch.clientX - sp.x, dy = touch.clientY - sp.y;
        if (Math.sqrt(dx*dx + dy*dy) > 10) {
          clearTimeout(timers.get(id));
          timers.delete(id);
          startPos.delete(id);
        }
      });
    }, {passive: true});

    el.addEventListener('touchend', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        if (timers.has(id)) {
          clearTimeout(timers.get(id));
          timers.delete(id);
          startPos.delete(id);
          trigger(i);
        }
      });
    }, {passive: false});

    el.addEventListener('touchcancel', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        clearTimeout(timers.get(id));
        timers.delete(id);
        startPos.delete(id);
      });
    });

    // Desktop mouse
    let mouseTimer = null;
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      mouseTimer = setTimeout(() => { mouseTimer = null; openPicker(i); }, LONG_PRESS_MS);
    });
    el.addEventListener('mouseup',    () => { if (mouseTimer) { clearTimeout(mouseTimer); mouseTimer = null; trigger(i); } });
    el.addEventListener('mouseleave', () => { if (mouseTimer) { clearTimeout(mouseTimer); mouseTimer = null; } });

  } else if (pad.type === 'fx') {
    const fxIdx = i - 8; // 0-3 within FX section
    const timers   = new Map();
    const startPos = new Map();

    el.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        startPos.set(id, {x: touch.clientX, y: touch.clientY});
        timers.set(id, setTimeout(() => {
          timers.delete(id); startPos.delete(id);
          openFXPicker(fxIdx);
        }, LONG_PRESS_MS));
      });
    }, {passive: false});

    el.addEventListener('touchmove', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        const sp = startPos.get(id);
        if (!sp) return;
        const dx = touch.clientX - sp.x, dy = touch.clientY - sp.y;
        if (Math.sqrt(dx*dx + dy*dy) > 10) {
          clearTimeout(timers.get(id));
          timers.delete(id); startPos.delete(id);
        }
      });
    }, {passive: true});

    el.addEventListener('touchend', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        if (timers.has(id)) {
          clearTimeout(timers.get(id));
          timers.delete(id); startPos.delete(id);
          trigger(i);
        }
      });
    }, {passive: false});

    el.addEventListener('touchcancel', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        clearTimeout(timers.get(id));
        timers.delete(id); startPos.delete(id);
      });
    });

    let mouseTimer = null;
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      mouseTimer = setTimeout(() => { mouseTimer = null; openFXPicker(fxIdx); }, LONG_PRESS_MS);
    });
    el.addEventListener('mouseup',    () => { if (mouseTimer) { clearTimeout(mouseTimer); mouseTimer = null; trigger(i); } });
    el.addEventListener('mouseleave', () => { if (mouseTimer) { clearTimeout(mouseTimer); mouseTimer = null; } });

  } else {
    // Drum pads: each new touch triggers independently
    el.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(() => trigger(i));
    }, {passive: false});
    el.addEventListener('mousedown', e => { e.preventDefault(); trigger(i); });
  }
});

// ─── Trigger ──────────────────────────────────────────────────────────────────
function trigger(idx) {
  boot();
  PADS[idx].fn();
  display.textContent = `[ ${DNAMES[idx]} ]`;
  const led = leds[idx % 8];
  led.classList.add('on');
  setTimeout(() => led.classList.remove('on'), 160);
  padEls[idx].classList.add('active');
  setTimeout(() => padEls[idx].classList.remove('active'), 160);
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
const keyMap = Object.fromEntries(PADS.map((p,i) => [p.key, i]));
document.addEventListener('keydown', e => {
  if (e.repeat || e.ctrlKey || e.metaKey) return;
  const k = e.key.toLowerCase();
  if (k in keyMap) { e.preventDefault(); trigger(keyMap[k]); }
});

// ─── Drum roll picker ─────────────────────────────────────────────────────────
const ITEM_H = 44;
const PAD_COUNT = 2; // empty padding items each side

let pickerIdx  = -1;    // pad index being edited
let pickerMode = 'chord'; // 'chord' | 'fx'
const rootDrum    = document.getElementById('rootDrum');
const typeDrum    = document.getElementById('typeDrum');
const fxDrum      = document.getElementById('fxDrum');
const overlay     = document.getElementById('pickerOverlay');
const pickerTitle = document.getElementById('pickerTitle');
const pickerCols  = document.querySelector('.picker-cols');

function buildDrum(drumEl, items) {
  drumEl.innerHTML = '';
  for (let i = 0; i < PAD_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'picker-item picker-pad';
    drumEl.appendChild(d);
  }
  items.forEach(text => {
    const d = document.createElement('div');
    d.className = 'picker-item';
    d.textContent = text;
    drumEl.appendChild(d);
  });
  for (let i = 0; i < PAD_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'picker-item picker-pad';
    drumEl.appendChild(d);
  }
}

function scrollTo(drumEl, idx) {
  drumEl.scrollTop = idx * ITEM_H;
}

function getIdx(drumEl) {
  return Math.max(0, Math.round(drumEl.scrollTop / ITEM_H));
}

function updateHighlights(drumEl) {
  const sel = getIdx(drumEl);
  Array.from(drumEl.children).forEach((child, ci) => {
    const realIdx = ci - PAD_COUNT;
    child.classList.remove('pi-sel', 'pi-near');
    if (realIdx === sel)             child.classList.add('pi-sel');
    else if (Math.abs(realIdx-sel) === 1) child.classList.add('pi-near');
  });
}

function openFXPicker(fxIdx) {
  pickerMode = 'fx';
  pickerCols.classList.add('fx-mode');
  pickerIdx = fxIdx;
  pickerTitle.textContent = `── FX PAD ${fxIdx + 1} ──`;
  buildDrum(fxDrum, FX_SOUNDS.map(s => s.name));
  fxDrum.addEventListener('scroll', () => updateHighlights(fxDrum), {passive: true});
  overlay.classList.remove('hidden');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    scrollTo(fxDrum, padFX[fxIdx]);
    updateHighlights(fxDrum);
  }));
}

function openPicker(padId) {
  pickerMode = 'chord';
  pickerCols.classList.remove('fx-mode');
  pickerIdx = padId;
  const pc = padChords[padId];
  pickerTitle.textContent = `── EDIT: ${chordName(pc.r, pc.t)} ──`;

  buildDrum(rootDrum, ROOTS);
  buildDrum(typeDrum, TYPES);

  rootDrum.addEventListener('scroll', () => updateHighlights(rootDrum), {passive:true});
  typeDrum.addEventListener('scroll', () => updateHighlights(typeDrum), {passive:true});

  overlay.classList.remove('hidden');

  // Set scroll after render
  requestAnimationFrame(() => requestAnimationFrame(() => {
    scrollTo(rootDrum, pc.r);
    scrollTo(typeDrum, TYPES.indexOf(pc.t));
    updateHighlights(rootDrum);
    updateHighlights(typeDrum);
  }));
}

function closePicker() {
  overlay.classList.add('hidden');
  pickerIdx = -1;
}

function saveFXPicker() {
  if (pickerIdx < 0) return;
  const fi = getIdx(fxDrum);
  padFX[pickerIdx] = fi;
  const fxPadGlobal = 8 + pickerIdx;
  const sound = FX_SOUNDS[fi];
  PADS[fxPadGlobal].name = sound.padName;
  DNAMES[fxPadGlobal] = sound.name;
  padEls[fxPadGlobal].querySelector('.pad-name').innerHTML = sound.padName.replace('\n', '<br>');
  closePicker();
}

function savePicker() {
  if (pickerMode === 'fx') { saveFXPicker(); return; }
  if (pickerIdx < 0) return;
  const ri = getIdx(rootDrum);
  const ti = getIdx(typeDrum);
  const pc = padChords[pickerIdx];
  pc.r = ri;
  pc.t = TYPES[ti];

  const name = chordName(ri, TYPES[ti]);
  PADS[pickerIdx].name = name;
  DNAMES[pickerIdx] = name;
  padEls[pickerIdx].querySelector('.pad-name').textContent = name;

  closePicker();
}

document.getElementById('pickerCancel').addEventListener('click', closePicker);
document.getElementById('pickerConfirm').addEventListener('click', savePicker);
overlay.addEventListener('click', e => { if (e.target === overlay) closePicker(); });
overlay.addEventListener('touchstart', e => {
  if (e.target === overlay) { e.preventDefault(); closePicker(); }
}, {passive:false});

// ─── PWA: Service Worker + Silent Mode Audio ──────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Resume AudioContext when app returns to foreground (PWA standalone + iOS)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && ctx && ctx.state === 'suspended') {
    ctx.resume();
  }
});

// iOS: unlock AudioContext on first touch anywhere (Web Audio bypasses silent mode)
document.addEventListener('touchstart', () => {
  if (ctx && ctx.state === 'suspended') ctx.resume();
}, {once: true, passive: true});
</script>
