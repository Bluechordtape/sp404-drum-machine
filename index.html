<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07111e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500&display=swap" rel="stylesheet">
<title>BCT-404</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07111e;
  --surface: #0d1b2a;
  --surface2: #091522;
  --border: rgba(255,255,255,0.07);
  --text: #ddd8d0;
  --muted: rgba(221,216,208,0.4);
  --primary: #1a3aff;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --gap: 4px;
}

html {
  height: 100%;
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Public Sans', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  padding: var(--safe-top) var(--gap) var(--safe-bot);
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ── BCT Navigation Header ── */
.bct-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px 6px;
  flex-shrink: 0;
  width: 100%;
}
.bct-back {
  font-family: 'Public Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--primary);
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
.bct-reel-logo { display: flex; align-items: center; gap: 4px; }
.bct-reel-c {
  width: 11px; height: 11px;
  border: 1.5px solid var(--primary);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.bct-reel-c::after {
  content: '';
  width: 3px; height: 3px;
  background: var(--primary);
  border-radius: 50%;
}
.bct-reel-bar { width: 8px; height: 1.5px; background: var(--primary); }

/* ── Machine shell ── */
.machine {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 10px 0;
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
  flex-shrink: 0;
}
.brand {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--text);
  line-height: 1;
}
.model-line {
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-top: 3px;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── Display ── */
.display {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 10px;
  color: var(--muted);
  font-family: 'Public Sans', sans-serif;
  letter-spacing: 0.12em;
  text-align: center;
  white-space: nowrap;
}

/* ── LED strip ── */
.led-strip { display: none; }
.led {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border);
  transition: all 0.08s ease;
}
.led.on { background: var(--primary); box-shadow: 0 0 6px rgba(26,58,255,0.7); }

/* ── Section labels ── */
.section-label { display: none; }

/* ── Pad grid ── */
.pad-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 1fr;
  gap: var(--gap);
  flex: 1;
  min-height: 0;
  padding-bottom: var(--gap);
}

/* ── Pad base ── */
.pad {
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4px;
  min-height: 70px;
  position: relative;
  overflow: hidden;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.06s ease, background 0.06s ease, border-color 0.06s ease;
}
.pad::after { display: none; }
.pad.active {
  transform: scale(0.93) translateY(1px);
  background: var(--primary);
  border-color: var(--primary);
}

/* Chord / FX / Drum — unified style */
.pad.chord { }
.pad.chord.active { }
.pad.fx { }
.pad.fx.active { }
.pad.drum { }
.pad.drum.active { }

/* Pad text */
.pad-name {
  font-size: clamp(9px, 2.8vw, 13px);
  font-weight: 500;
  letter-spacing: 0.02em;
  line-height: 1.2;
  color: var(--text);
  pointer-events: none;
}
.pad.active .pad-name { color: #fff; }
.pad-hint {
  font-size: 8px;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-top: 2px;
  pointer-events: none;
}
.pad.active .pad-hint { color: rgba(255,255,255,0.6); }
.pad-key { display: none; }
.pad > * { pointer-events: none; }

/* ── Controls & Footer ── */
.controls { display: none; }
.knob-row { display: flex; gap: 12px; align-items: center; }
.knob-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.knob {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border); position: relative;
}
.knob::after {
  content: ''; position: absolute; top: 5px; left: 50%;
  transform: translateX(-50%); width: 2px; height: 8px;
  background: var(--primary); border-radius: 1px;
}
.knob-label { font-size: 7px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.key-hint { display: none; }
.footer { display: none; }

/* ── Picker overlay ── */
.picker-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
  padding: max(env(safe-area-inset-top), 12px) 12px max(env(safe-area-inset-bottom), 12px);
}
.picker-overlay.hidden { display: none; }

.picker-modal {
  background: var(--surface);
  border: 1px solid rgba(26,58,255,0.3);
  border-radius: 14px;
  padding: 18px 16px 16px;
  width: min(300px, 88vw);
  box-shadow: 0 0 40px rgba(26,58,255,0.12), 0 20px 60px rgba(0,0,0,0.7);
}

.picker-title {
  color: var(--primary);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-align: center;
  margin-bottom: 14px;
}

.picker-cols {
  display: flex;
  gap: 10px;
  position: relative;
}
.picker-col {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.picker-label {
  font-size: 8px;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-align: center;
  padding-bottom: 6px;
  flex-shrink: 0;
  height: 22px;
  text-transform: uppercase;
}
.picker-drum-wrap {
  position: relative;
  height: 132px;
  overflow: hidden;
}
.picker-drum-wrap::before,
.picker-drum-wrap::after {
  content: '';
  position: absolute; left: 0; right: 0;
  height: 55px;
  pointer-events: none; z-index: 3;
}
.picker-drum-wrap::before {
  top: 0;
  background: linear-gradient(to bottom, var(--surface) 10%, transparent 100%);
}
.picker-drum-wrap::after {
  bottom: 0;
  background: linear-gradient(to top, var(--surface) 10%, transparent 100%);
}
.picker-drum {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
  -ms-overflow-style: none;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
.picker-drum::-webkit-scrollbar { display: none; }
.picker-item {
  height: 44px;
  scroll-snap-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Public Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: rgba(221,216,208,0.2);
  transform: scale(0.78);
  transition: color 0.12s, transform 0.12s;
  cursor: pointer;
}
.picker-item.pi-near  { color: rgba(221,216,208,0.55); transform: scale(0.9); }
.picker-item.pi-sel   { color: var(--text); transform: scale(1.08); }
.picker-item.picker-pad { pointer-events: none; }

.chord-only { display: flex; }
.fx-only    { display: none; }
.picker-cols.fx-mode .chord-only { display: none; }
.picker-cols.fx-mode .fx-only    { display: flex; }

.picker-sel-bar {
  position: absolute;
  left: 0; right: 0;
  top: 50%; height: 44px;
  transform: translateY(-50%);
  border-top: 1px solid rgba(26,58,255,0.4);
  border-bottom: 1px solid rgba(26,58,255,0.4);
  pointer-events: none; z-index: 2;
}

/* ── Volume column ── */
.picker-col.vol-col { flex: 0 0 62px; flex-shrink: 0; }
.picker-cols.drum-mode .chord-only { display: none; }

/* ── Per-pad vol badge ── */
.pad-vol {
  position: absolute;
  bottom: 3px; right: 4px;
  font-size: 7px;
  letter-spacing: 0.04em;
  color: var(--muted);
  pointer-events: none;
  line-height: 1;
}
.pad.active .pad-vol { color: rgba(255,255,255,0.55); }

.picker-btns {
  display: flex; gap: 8px; margin-top: 14px;
}
.picker-btn {
  flex: 1; padding: 10px 0;
  border-radius: 7px; border: none;
  font-family: 'Public Sans', sans-serif;
  font-size: 10px; letter-spacing: 0.15em; font-weight: 500;
  cursor: pointer;
}
.picker-btn.cancel  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.picker-btn.confirm { background: var(--primary); color: #fff; }

/* ── PWA 스탠드얼론: 네비 숨기고 패드 공간 최대화 ── */
@media (display-mode: standalone) {
  .bct-nav { display: none; }
  body { padding-top: max(var(--safe-top), 8px); }
}

/* ── iPhone SE / 낮은 화면 (height ≤ 680px) ── */
@media (max-height: 680px) and (hover: none) {
  .bct-nav { padding: 3px 10px 2px; }
  .machine { padding: 6px 6px 0; border-radius: 10px; }
  .header { padding-bottom: 5px; margin-bottom: 3px; }
  .brand { font-size: 16px; letter-spacing: 3px; }
  .model-line { font-size: 7px; margin-top: 1px; }
  .display { font-size: 9px; padding: 2px 8px; }
  .pad { min-height: 58px; border-radius: 5px; }
  .pad-name { font-size: clamp(8px, 2.5vw, 11px); }
}

/* ── Desktop restore ── */
@media (hover: hover) and (pointer: fine) and (min-width: 500px) {
  body {
    align-items: center; justify-content: center;
    height: auto; min-height: 100vh; min-height: 100dvh;
    padding: 12px; overflow-x: hidden;
  }
  .bct-nav { max-width: 560px; padding: 12px 0 8px; }
  .bct-back { font-size: 11px; }
  .machine {
    display: block; flex: none;
    border-radius: 16px; padding: 24px;
    width: 100%; max-width: 560px;
  }
  .header { align-items: flex-start; margin-bottom: 16px; padding-bottom: 12px; }
  .brand { font-size: 26px; letter-spacing: 6px; }
  .model-line { font-size: 9px; margin-top: 4px; }
  .display { font-size: 11px; padding: 6px 12px; min-width: 120px; }
  .led-strip { display: flex; gap: 5px; justify-content: center; margin: 10px 0 8px; }
  .section-label {
    display: block; font-size: 8px; letter-spacing: 0.2em;
    color: var(--muted); text-align: center;
    padding: 7px 0 4px; text-transform: uppercase; grid-column: 1 / -1;
  }
  .pad-grid { grid-auto-rows: auto; gap: 8px; flex: none; min-height: auto; padding-bottom: 0; }
  .pad { aspect-ratio: 1; min-height: auto; }
  .pad:hover { border-color: rgba(26,58,255,0.4); }
  .pad-name { font-size: 10px; }
  .pad-hint { display: none; }
  .pad-key { display: block; font-size: 8px; color: var(--muted); margin-top: 4px; letter-spacing: 0.05em; pointer-events: none; }
  .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); gap: 8px; }
  .key-hint { display: block; font-size: 8px; color: var(--muted); line-height: 2; text-align: right; letter-spacing: 0.03em; }
  .footer { display: block; text-align: center; margin-top: 12px; font-size: 7px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
}
</style>
</head>
<body>
<header class="bct-nav">
  <a class="bct-back" href="https://bluechordtape-hub.vercel.app">← BLUE CHORD TAPE</a>
  <div class="bct-reel-logo">
    <div class="bct-reel-c"></div>
    <div class="bct-reel-bar"></div>
    <div class="bct-reel-c"></div>
  </div>
</header>
<div class="machine">
  <div class="header">
    <div>
      <div class="brand">BCT-404</div>
      <div class="model-line">Jazz Hip-Hop · Web Audio</div>
    </div>
    <div class="display" id="display">[ READY ]</div>
  </div>

  <div class="led-strip">
    <div class="led" id="l0"></div><div class="led" id="l1"></div>
    <div class="led" id="l2"></div><div class="led" id="l3"></div>
    <div class="led" id="l4"></div><div class="led" id="l5"></div>
    <div class="led" id="l6"></div><div class="led" id="l7"></div>
  </div>

  <div class="pad-grid" id="padGrid"></div>

  <div class="controls">
    <div class="knob-row">
      <div class="knob-wrap"><div class="knob"></div><div class="knob-label">Reverb</div></div>
      <div class="knob-wrap"><div class="knob"></div><div class="knob-label">Lo-Fi</div></div>
      <div class="knob-wrap"><div class="knob"></div><div class="knob-label">Drive</div></div>
    </div>
    <div class="key-hint">
      Q W E R — chords 1~4<br>
      A S D F — chords 5~8<br>
      Z X C V — fx<br>
      1 2 3 4 — drums
    </div>
  </div>
  <div class="footer">BCT-404 · Jazz Hip-Hop · Web Audio API</div>
</div>

<!-- Chord editor picker -->
<div id="pickerOverlay" class="picker-overlay hidden">
  <div class="picker-modal">
    <div class="picker-title" id="pickerTitle">── EDIT PAD ──</div>
    <div class="picker-cols">
      <div class="picker-col chord-only">
        <div class="picker-label">ROOT</div>
        <div class="picker-drum-wrap">
          <div class="picker-drum" id="rootDrum"></div>
          <div class="picker-sel-bar"></div>
        </div>
      </div>
      <div class="picker-col chord-only">
        <div class="picker-label">TYPE</div>
        <div class="picker-drum-wrap">
          <div class="picker-drum" id="typeDrum"></div>
          <div class="picker-sel-bar"></div>
        </div>
      </div>
      <div class="picker-col fx-only">
        <div class="picker-label">SOUND</div>
        <div class="picker-drum-wrap">
          <div class="picker-drum" id="fxDrum"></div>
          <div class="picker-sel-bar"></div>
        </div>
      </div>
      <div class="picker-col vol-col">
        <div class="picker-label">VOL</div>
        <div class="picker-drum-wrap">
          <div class="picker-drum" id="volDrum"></div>
          <div class="picker-sel-bar"></div>
        </div>
      </div>
    </div>
    <div class="picker-btns">
      <button class="picker-btn cancel" id="pickerCancel">CANCEL</button>
      <button class="picker-btn confirm" id="pickerConfirm">SAVE</button>
    </div>
  </div>
</div>

<script>
// ─── Audio Context ────────────────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let ctx, masterOut, dryBus, wetBus, reverbNode;

// ─── iOS Silent Mode Bypass ───────────────────────────────────────────────────
// iOS uses AVAudioSessionCategoryAmbient for Web Audio (muted by silent switch).
// Fix: play a looping HTMLAudioElement to lock the session into
// AVAudioSessionCategoryPlayback permanently — even with silent mode on.
// KEY: the element must keep looping; a 1-shot play lets iOS revert the session.
let _silentEl = null, _silentDone = false;
(function() {
  try {
    // Build a 1-second silent WAV: 8 kHz, 8-bit, mono → 8000 samples
    const rate = 8000, n = rate;
    const ab = new ArrayBuffer(44 + n);
    const dv = new DataView(ab);
    const ws = (o, s) => { for (let i = 0; i < s.length; i++) dv.setUint8(o + i, s.charCodeAt(i)); };
    ws(0,'RIFF'); dv.setUint32(4, 36 + n, true);
    ws(8,'WAVE'); ws(12,'fmt '); dv.setUint32(16, 16, true);
    dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);   // PCM, mono
    dv.setUint32(24, rate, true); dv.setUint32(28, rate, true);
    dv.setUint16(32, 1, true); dv.setUint16(34, 8, true);   // 8-bit
    ws(36,'data'); dv.setUint32(40, n, true);
    for (let i = 0; i < n; i++) dv.setUint8(44 + i, 128);  // 0x80 = silence
    _silentEl = new Audio(URL.createObjectURL(new Blob([ab], {type:'audio/wav'})));
    _silentEl.loop = true;     // keeps session in Playback mode indefinitely
    _silentEl.volume = 0.001;
    _silentEl.preload = 'auto';
  } catch(e) {}
})();

function bypassSilent() {
  if (_silentDone || !_silentEl) return;
  _silentEl.play().then(() => { _silentDone = true; }).catch(() => {});
}

function boot() {
  bypassSilent();
  if (ctx) { if (ctx.state === 'suspended') ctx.resume(); return; }
  ctx = new AC();

  const tapeSat = ctx.createWaveShaper();
  tapeSat.curve = tapeClip(1.6);
  tapeSat.oversample = '2x';
  tapeSat.connect(ctx.destination);

  masterOut = ctx.createGain();
  masterOut.gain.value = 0.80;
  masterOut.connect(tapeSat);

  const rate = ctx.sampleRate, len = Math.floor(rate * 2.8);
  const imp = ctx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const d = imp.getChannelData(ch);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
  }
  reverbNode = ctx.createConvolver();
  reverbNode.buffer = imp;

  dryBus = ctx.createGain(); dryBus.gain.value = 0.65;
  wetBus = ctx.createGain(); wetBus.gain.value = 0.38;
  dryBus.connect(masterOut);
  wetBus.connect(reverbNode);
  reverbNode.connect(masterOut);
}

function distCurve(k) {
  const n = 256, c = new Float32Array(n), deg = Math.PI / 180;
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    c[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
  }
  return c;
}

function tapeClip(drive) {
  const n = 512, c = new Float32Array(n), norm = Math.tanh(drive);
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    c[i] = Math.tanh(x * drive) / norm;
  }
  return c;
}

// ─── Chord System ─────────────────────────────────────────────────────────────
const semitone = (base, n) => base * Math.pow(2, n / 12);
const C3 = 130.81;

// Root notes (flats for jazz convention)
const ROOTS = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

// Chord types (jazz notation)
const TYPES = ['maj','m','maj7','m7','maj9','m9','7','m7b5','maj7#11','13','7#9','dim','aug'];

// Intervals from bass root — open jazz voicings
const CHORD_INTERVALS = {
  'maj':     [0, 16, 19],
  'm':       [0, 15, 19],
  'maj7':    [0, 16, 19, 23],
  'm7':      [0, 15, 19, 22],
  'maj9':    [0, 16, 19, 23, 26],
  'm9':      [0, 15, 19, 22, 26],
  '7':       [0, 16, 19, 22],
  'm7b5':    [0, 15, 18, 22],
  'maj7#11': [0, 16, 19, 23, 30],
  '13':      [0, 16, 22, 26, 33],
  '7#9':     [0, 16, 19, 22, 27],
  'dim':     [0, 15, 18, 21],
  'aug':     [0, 16, 20],
};

function buildFreqs(rootIdx, typeKey) {
  // Bass in C2-C3 area: roots 0-5 stay in C3 octave, 6-11 shift down
  const offset = rootIdx <= 5 ? rootIdx : rootIdx - 12;
  const bass = semitone(C3, offset);
  return (CHORD_INTERVALS[typeKey] || [0,16,19,23]).map(iv => semitone(bass, iv));
}

function chordName(rootIdx, typeKey) {
  return ROOTS[rootIdx] + typeKey;
}

// Mutable chord state for each of the 8 chord pads
const padChords = [
  {r:2,  t:'maj7'},  // Dmaj7
  {r:9,  t:'m7'},    // Am7
  {r:7,  t:'maj7'},  // Gmaj7
  {r:10, t:'maj7'},  // Bbmaj7
  {r:4,  t:'m9'},    // Em9
  {r:11, t:'m7'},    // Bm7
  {r:9,  t:'13'},    // A13
  {r:0,  t:'maj7'},  // Cmaj7
];

// ─── Monophonic chord engine ───────────────────────────────────────────────────
let activeChordEnv = null;

function stopActiveChord(fadeMs = 350) {
  if (!activeChordEnv || !ctx) return;
  const t = ctx.currentTime;
  try {
    activeChordEnv.gain.cancelScheduledValues(t);
    activeChordEnv.gain.setValueAtTime(activeChordEnv.gain.value, t);
    activeChordEnv.gain.exponentialRampToValueAtTime(0.0001, t + fadeMs / 1000);
  } catch(e) {}
  activeChordEnv = null;
}

function playChord(padIdx) {
  boot();
  stopActiveChord();

  const pc    = padChords[padIdx];
  const freqs = buildFreqs(pc.r, pc.t);
  const name  = chordName(pc.r, pc.t);
  const cfg   = CHORD_CFG[name] || DEFAULT_CFG;
  const t     = ctx.currentTime;
  const dur   = cfg.dur, atk = cfg.atk, det = cfg.det;
  const btype = cfg.type;

  const vol = 0.22 * _vol / Math.sqrt(freqs.length);
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + atk);
  env.gain.setValueAtTime(vol, t + dur * 0.42);
  env.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  activeChordEnv = env;

  const lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = cfg.lpf;
  lpf.Q.value = cfg.Q;

  const revSend = ctx.createGain();
  revSend.gain.value = cfg.rev;

  env.connect(lpf);
  lpf.connect(dryBus);
  lpf.connect(revSend);
  revSend.connect(wetBus);

  // Dilla tape wobble LFO
  let lfoAmt = null;
  if (cfg.dilla) {
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 3.4 + Math.random() * 1.2;
    lfoAmt = ctx.createGain();
    lfoAmt.gain.value = 11;
    lfo.connect(lfoAmt);
    lfo.start(t); lfo.stop(t + dur + 0.1);
  }

  freqs.forEach((freq, i) => {
    [0, det + (Math.random() - 0.5) * 3].forEach((d, di) => {
      const o = ctx.createOscillator();
      o.type = i === 0 ? 'sawtooth' : btype;
      o.frequency.value = freq;
      o.detune.value = d + (Math.random() - 0.5) * 3;
      if (lfoAmt) lfoAmt.connect(o.detune);
      const g = ctx.createGain();
      g.gain.value = di === 0 ? (i === 0 ? 0.80 : 0.60) : 0.30;
      o.connect(g); g.connect(env);
      o.start(t); o.stop(t + dur + 0.06);
    });
  });
}

// ─── Drums ────────────────────────────────────────────────────────────────────
function playKick() {
  boot();
  const t = ctx.currentTime;
  const body = ctx.createOscillator(); body.type = 'sine';
  body.frequency.setValueAtTime(190, t);
  body.frequency.exponentialRampToValueAtTime(44, t + 0.07);
  body.frequency.exponentialRampToValueAtTime(28, t + 0.22);

  const click = ctx.createOscillator(); click.type = 'triangle';
  click.frequency.setValueAtTime(1400, t);
  click.frequency.exponentialRampToValueAtTime(80, t + 0.018);

  const bg = ctx.createGain();
  bg.gain.setValueAtTime(1.4 * _vol, t);
  bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
  const cg = ctx.createGain();
  cg.gain.setValueAtTime(0.65 * _vol, t);
  cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);

  const ws = ctx.createWaveShaper(); ws.curve = distCurve(60);
  const comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -4; comp.ratio.value = 10;
  comp.attack.value = 0.001; comp.release.value = 0.12;

  body.connect(bg); click.connect(cg);
  bg.connect(ws); cg.connect(ws);
  ws.connect(comp); comp.connect(masterOut);
  body.start(t); body.stop(t + 0.45);
  click.start(t); click.stop(t + 0.05);
}

function playRecordCrackle() {
  boot();
  const t = ctx.currentTime, dur = 2.2, rate = ctx.sampleRate;
  const nb = ctx.createBuffer(1, Math.floor(rate * dur), rate);
  const nd = nb.getChannelData(0);
  for (let i = 0; i < nd.length; i++) {
    nd[i] = (Math.random() * 2 - 1) * 0.05;
    if (Math.random() < 0.0012) {
      const pl = Math.floor(Math.random() * 90 + 18), amp = Math.random() * 0.9 + 0.15;
      for (let j = 0; j < pl && i + j < nd.length; j++)
        nd[i + j] += Math.sin((j / pl) * Math.PI) * amp * (Math.random() * 2 - 1);
    }
  }
  const ns = ctx.createBufferSource(); ns.buffer = nb;
  const bpf = ctx.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = 3200; bpf.Q.value = 0.45;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.325 * _vol, t); g.gain.setValueAtTime(0.325 * _vol, t + dur - 0.15);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  ns.connect(bpf); bpf.connect(g); g.connect(masterOut); ns.start(t);
}

// ─── Voice FX (Web Speech API + autotune flourish) ────────────────────────────
let _voices = [];
function _loadVoices() { _voices = speechSynthesis.getVoices(); }
if (window.speechSynthesis) {
  _loadVoices();
  speechSynthesis.addEventListener('voiceschanged', _loadVoices);
}

function speakCool(text) {
  if (!window.speechSynthesis) return;
  boot();
  const u = new SpeechSynthesisUtterance(text);
  u.pitch = 0.55; u.rate = 0.78; u.volume = Math.min(1.0, 0.85 * _vol);
  const voices = _voices.length ? _voices : speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && /male/i.test(v.name))
    || voices.find(v => v.lang.startsWith('en'))
    || voices[0];
  if (enVoice) u.voice = enVoice;
  speechSynthesis.speak(u);
}

function speakBaby(text) {
  if (!window.speechSynthesis) return;
  boot();
  const u = new SpeechSynthesisUtterance(text);
  u.pitch = 2.0; u.rate = 1.1; u.volume = Math.min(1.0, _vol);
  const voices = _voices.length ? _voices : speechSynthesis.getVoices();
  const koVoice = voices.find(v => v.lang.startsWith('ko'))
    || voices.find(v => v.lang.startsWith('en'))
    || voices[0];
  if (koVoice) u.voice = koVoice;
  speechSynthesis.speak(u);
}

function speakFr(text) {
  if (!window.speechSynthesis) return;
  boot();
  const u = new SpeechSynthesisUtterance(text);
  u.pitch = 1.15; u.rate = 0.82; u.volume = Math.min(1.0, _vol);
  const voices = _voices.length ? _voices : speechSynthesis.getVoices();
  const frVoice = voices.find(v => v.lang.startsWith('fr') && /female|woman|fiona|amelie|alice|thomas/i.test(v.name))
    || voices.find(v => v.lang.startsWith('fr'))
    || voices.find(v => /female|woman/i.test(v.name))
    || voices[0];
  if (frVoice) u.voice = frVoice;
  speechSynthesis.speak(u);
}

  { name:'Bbmaj7', type:'chord', key:'4', fn:()=>playChord(3) },
  { name:'Em9',    type:'chord', key:'q', fn:()=>playChord(4) },
  { name:'Bm7',    type:'chord', key:'w', fn:()=>playChord(5) },
  { name:'A13',    type:'chord', key:'e', fn:()=>playChord(6) },
  { name:'Cmaj7',  type:'chord', key:'r', fn:()=>playChord(7) },
  { name: FX_SOUNDS[0].padName, type:'fx', key:'a', fn:()=>playFX(0) },
  { name: FX_SOUNDS[1].padName, type:'fx', key:'s', fn:()=>playFX(1) },
  { name: FX_SOUNDS[2].padName, type:'fx', key:'d', fn:()=>playFX(2) },
  { name: FX_SOUNDS[3].padName, type:'fx', key:'f', fn:()=>playFX(3) },
  { name:'KICK',        type:'drum', key:'z', fn:playKick     },
  { name:'SNARE',       type:'drum', key:'x', fn:playSnare    },
  { name:'HH\nCLOSED',  type:'drum', key:'c', fn:playHHClosed },
  { name:'HH\nOPEN',    type:'drum', key:'v', fn:playHHOpen   },
];

// Mutable display names (chord names change on edit)
const DNAMES = PADS.map(p => p.name.replace('\n',' '));

// ─── Build DOM ────────────────────────────────────────────────────────────────
const grid    = document.getElementById('padGrid');
const display = document.getElementById('display');
const leds    = Array.from({length:8}, (_,i) => document.getElementById(`l${i}`));
const padEls  = [];
const SECTION = { 0:'— Chords —', 8:'— Effects —', 12:'— Drums —' };

const LONG_PRESS_MS = 480;

PADS.forEach((pad, i) => {
  if (SECTION[i]) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = SECTION[i];
    grid.appendChild(lbl);
  }
  const el = document.createElement('div');
  el.className = `pad ${pad.type}`;
  el.innerHTML =
    `<span class="pad-name">${pad.name.replace('\n','<br>')}</span>` +
    `<span class="pad-hint">hold</span>` +
    `<span class="pad-key">[${pad.key.toUpperCase()}]</span>` +
    `<span class="pad-vol" id="pvol-${i}"></span>`;
  grid.appendChild(el);
  padEls.push(el);

  if (pad.type === 'chord') {
    // Per-touch-point tracking for independent multi-touch long-press
    const timers   = new Map(); // identifier → timeoutId
    const startPos = new Map(); // identifier → {x, y}

    el.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        startPos.set(id, {x: touch.clientX, y: touch.clientY});
        trigger(i); // 터치 순간 즉시 재생
        timers.set(id, setTimeout(() => {
          timers.delete(id);
          startPos.delete(id);
          openPicker(i);
        }, LONG_PRESS_MS));
      });
    }, {passive: false});

    el.addEventListener('touchmove', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        const sp = startPos.get(id);
        if (!sp) return;
        const dx = touch.clientX - sp.x, dy = touch.clientY - sp.y;
        if (Math.sqrt(dx*dx + dy*dy) > 10) {
          clearTimeout(timers.get(id));
          timers.delete(id);
          startPos.delete(id);
        }
      });
    }, {passive: true});

    el.addEventListener('touchend', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        clearTimeout(timers.get(id));
        timers.delete(id);
        startPos.delete(id);
      });
    }, {passive: false});

    el.addEventListener('touchcancel', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        clearTimeout(timers.get(id));
        timers.delete(id);
        startPos.delete(id);
      });
    });

    // Desktop mouse
    let mouseTimer = null;
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      trigger(i); // 클릭 순간 즉시 재생
      mouseTimer = setTimeout(() => { mouseTimer = null; openPicker(i); }, LONG_PRESS_MS);
    });
    el.addEventListener('mouseup',    () => { if (mouseTimer) { clearTimeout(mouseTimer); mouseTimer = null; } });
    el.addEventListener('mouseleave', () => { if (mouseTimer) { clearTimeout(mouseTimer); mouseTimer = null; } });

  } else if (pad.type === 'fx') {
    const fxIdx = i - 8; // 0-3 within FX section
    const timers   = new Map();
    const startPos = new Map();

    el.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        startPos.set(id, {x: touch.clientX, y: touch.clientY});
        trigger(i); // 터치 순간 즉시 재생
        timers.set(id, setTimeout(() => {
          timers.delete(id); startPos.delete(id);
          openFXPicker(fxIdx);
        }, LONG_PRESS_MS));
      });
    }, {passive: false});

    el.addEventListener('touchmove', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        const sp = startPos.get(id);
        if (!sp) return;
        const dx = touch.clientX - sp.x, dy = touch.clientY - sp.y;
        if (Math.sqrt(dx*dx + dy*dy) > 10) {
          clearTimeout(timers.get(id));
          timers.delete(id); startPos.delete(id);
        }
      });
    }, {passive: true});

    el.addEventListener('touchend', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        clearTimeout(timers.get(id));
        timers.delete(id); startPos.delete(id);
      });
    }, {passive: false});

    el.addEventListener('touchcancel', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        clearTimeout(timers.get(id));
        timers.delete(id); startPos.delete(id);
      });
    });

    let mouseTimer = null;
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      trigger(i); // 클릭 순간 즉시 재생
      mouseTimer = setTimeout(() => { mouseTimer = null; openFXPicker(fxIdx); }, LONG_PRESS_MS);
    });
    el.addEventListener('mouseup',    () => { if (mouseTimer) { clearTimeout(mouseTimer); mouseTimer = null; } });
    el.addEventListener('mouseleave', () => { if (mouseTimer) { clearTimeout(mouseTimer); mouseTimer = null; } });

  } else {
    // Drum pads: immediate trigger on touch, long-press → volume picker
    const dtimers   = new Map();
    const dstartPos = new Map();
    el.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        dstartPos.set(id, {x: touch.clientX, y: touch.clientY});
        trigger(i);
        dtimers.set(id, setTimeout(() => {
          dtimers.delete(id); dstartPos.delete(id);
          openDrumPicker(i);
        }, LONG_PRESS_MS));
      });
    }, {passive: false});
    el.addEventListener('touchmove', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        const sp = dstartPos.get(id);
        if (!sp) return;
        const dx = touch.clientX - sp.x, dy = touch.clientY - sp.y;
        if (Math.sqrt(dx*dx + dy*dy) > 10) {
          clearTimeout(dtimers.get(id));
          dtimers.delete(id); dstartPos.delete(id);
        }
      });
    }, {passive: true});
    el.addEventListener('touchend', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        clearTimeout(dtimers.get(id));
        dtimers.delete(id); dstartPos.delete(id);
      });
    }, {passive: false});
    el.addEventListener('touchcancel', e => {
      Array.from(e.changedTouches).forEach(touch => {
        const id = touch.identifier;
        clearTimeout(dtimers.get(id));
        dtimers.delete(id); dstartPos.delete(id);
      });
    });
    let dmouseTimer = null;
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      trigger(i);
      dmouseTimer = setTimeout(() => { dmouseTimer = null; openDrumPicker(i); }, LONG_PRESS_MS);
    });
    el.addEventListener('mouseup',    () => { if (dmouseTimer) { clearTimeout(dmouseTimer); dmouseTimer = null; } });
    el.addEventListener('mouseleave', () => { if (dmouseTimer) { clearTimeout(dmouseTimer); dmouseTimer = null; } });
  }
});

// ─── Trigger ──────────────────────────────────────────────────────────────────
function updateVolDisplay(idx) {
  const el = document.getElementById(`pvol-${idx}`);
  if (!el) return;
  el.textContent = padVolumes[idx] !== VOL_DEFAULT_IDX ? (padVolumes[idx] * 10) + '%' : '';
}

function trigger(idx) {
  _vol = padVolumes[idx] / 10;
  boot();
  PADS[idx].fn();
  display.textContent = `[ ${DNAMES[idx]} ]`;
  const led = leds[idx % 8];
  led.classList.add('on');
  setTimeout(() => led.classList.remove('on'), 160);
  padEls[idx].classList.add('active');
  setTimeout(() => padEls[idx].classList.remove('active'), 160);
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
const keyMap = Object.fromEntries(PADS.map((p,i) => [p.key, i]));
document.addEventListener('keydown', e => {
  if (e.repeat || e.ctrlKey || e.metaKey) return;
  const k = e.key.toLowerCase();
  if (k in keyMap) { e.preventDefault(); trigger(keyMap[k]); }
});

// ─── Drum roll picker ─────────────────────────────────────────────────────────
const ITEM_H = 44;
const PAD_COUNT = 1; // empty padding items each side

let pickerIdx  = -1;    // pad index being edited
let pickerMode = 'chord'; // 'chord' | 'fx'
const rootDrum    = document.getElementById('rootDrum');
const typeDrum    = document.getElementById('typeDrum');
const fxDrum      = document.getElementById('fxDrum');
const volDrum     = document.getElementById('volDrum');
const overlay     = document.getElementById('pickerOverlay');
const pickerTitle = document.getElementById('pickerTitle');
const pickerCols  = document.querySelector('.picker-cols');

function buildDrum(drumEl, items) {
  drumEl.innerHTML = '';
  for (let i = 0; i < PAD_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'picker-item picker-pad';
    drumEl.appendChild(d);
  }
  items.forEach(text => {
    const d = document.createElement('div');
    d.className = 'picker-item';
    d.textContent = text;
    drumEl.appendChild(d);
  });
  for (let i = 0; i < PAD_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'picker-item picker-pad';
    drumEl.appendChild(d);
  }
}

function scrollTo(drumEl, idx) {
  drumEl.scrollTop = idx * ITEM_H;
}

function getIdx(drumEl) {
  return Math.max(0, Math.round(drumEl.scrollTop / ITEM_H));
}

function updateHighlights(drumEl) {
  const sel = getIdx(drumEl);
  Array.from(drumEl.children).forEach((child, ci) => {
    const realIdx = ci - PAD_COUNT;
    child.classList.remove('pi-sel', 'pi-near');
    if (realIdx === sel)             child.classList.add('pi-sel');
    else if (Math.abs(realIdx-sel) === 1) child.classList.add('pi-near');
  });
}

function openFXPicker(fxIdx) {
  pickerMode = 'fx';
  pickerCols.classList.add('fx-mode');
  pickerCols.classList.remove('drum-mode');
  pickerIdx = fxIdx;
  pickerTitle.textContent = `── FX PAD ${fxIdx + 1} ──`;
  buildDrum(fxDrum, FX_SOUNDS.map(s => s.name));
  buildDrum(volDrum, VOL_ITEMS);
  fxDrum.addEventListener('scroll', () => updateHighlights(fxDrum), {passive: true});
  volDrum.addEventListener('scroll', () => updateHighlights(volDrum), {passive: true});
  overlay.classList.remove('hidden');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    scrollTo(fxDrum, padFX[fxIdx]);
    scrollTo(volDrum, padVolumes[8 + fxIdx]);
    updateHighlights(fxDrum);
    updateHighlights(volDrum);
  }));
}

function openPicker(padId) {
  pickerMode = 'chord';
  pickerCols.classList.remove('fx-mode', 'drum-mode');
  pickerIdx = padId;
  const pc = padChords[padId];
  pickerTitle.textContent = `── EDIT: ${chordName(pc.r, pc.t)} ──`;

  buildDrum(rootDrum, ROOTS);
  buildDrum(typeDrum, TYPES);
  buildDrum(volDrum, VOL_ITEMS);

  rootDrum.addEventListener('scroll', () => updateHighlights(rootDrum), {passive:true});
  typeDrum.addEventListener('scroll', () => updateHighlights(typeDrum), {passive:true});
  volDrum.addEventListener('scroll',  () => updateHighlights(volDrum),  {passive:true});

  overlay.classList.remove('hidden');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    scrollTo(rootDrum, pc.r);
    scrollTo(typeDrum, TYPES.indexOf(pc.t));
    scrollTo(volDrum, padVolumes[padId]);
    updateHighlights(rootDrum);
    updateHighlights(typeDrum);
    updateHighlights(volDrum);
  }));
}

function openDrumPicker(padIdx) {
  pickerMode = 'drum';
  pickerCols.classList.remove('fx-mode');
  pickerCols.classList.add('drum-mode');
  pickerIdx = padIdx;
  const drumNames = ['KICK','SNARE','HH CLOSED','HH OPEN'];
  pickerTitle.textContent = `── ${drumNames[padIdx - 12]} VOL ──`;
  buildDrum(volDrum, VOL_ITEMS);
  volDrum.addEventListener('scroll', () => updateHighlights(volDrum), {passive: true});
  overlay.classList.remove('hidden');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    scrollTo(volDrum, padVolumes[padIdx]);
    updateHighlights(volDrum);
  }));
}

function closePicker() {
  overlay.classList.add('hidden');
  pickerCols.classList.remove('drum-mode', 'fx-mode');
  pickerIdx = -1;
}

function saveFXPicker() {
  if (pickerIdx < 0) return;
  const fi = getIdx(fxDrum);
  padFX[pickerIdx] = fi;
  const fxPadGlobal = 8 + pickerIdx;
  const sound = FX_SOUNDS[fi];
  PADS[fxPadGlobal].name = sound.padName;
  DNAMES[fxPadGlobal] = sound.name;
  padEls[fxPadGlobal].querySelector('.pad-name').innerHTML = sound.padName.replace('\n', '<br>');
  padVolumes[fxPadGlobal] = getIdx(volDrum);
  updateVolDisplay(fxPadGlobal);
  closePicker();
}

function saveDrumPicker() {
  if (pickerIdx < 0) return;
  padVolumes[pickerIdx] = getIdx(volDrum);
  updateVolDisplay(pickerIdx);
  closePicker();
}

function savePicker() {
  if (pickerMode === 'fx')   { saveFXPicker();   return; }
  if (pickerMode === 'drum') { saveDrumPicker(); return; }
  if (pickerIdx < 0) return;
  const ri = getIdx(rootDrum);
  const ti = getIdx(typeDrum);
  const pc = padChords[pickerIdx];
  pc.r = ri;
  pc.t = TYPES[ti];

  const name = chordName(ri, TYPES[ti]);
  PADS[pickerIdx].name = name;
  DNAMES[pickerIdx] = name;
  padEls[pickerIdx].querySelector('.pad-name').textContent = name;
  padVolumes[pickerIdx] = getIdx(volDrum);
  updateVolDisplay(pickerIdx);

  closePicker();
}

document.getElementById('pickerCancel').addEventListener('click', closePicker);
document.getElementById('pickerConfirm').addEventListener('click', savePicker);
overlay.addEventListener('click', e => { if (e.target === overlay) closePicker(); });
overlay.addEventListener('touchstart', e => {
  if (e.target === overlay) { e.preventDefault(); closePicker(); }
}, {passive:false});

// ─── PWA: Service Worker + Silent Mode Audio ──────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Resume AudioContext when app returns to foreground (PWA standalone + iOS)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && ctx && ctx.state === 'suspended') {
    ctx.resume();
  }
});

// iOS: unlock AudioContext on first touch anywhere (Web Audio bypasses silent mode)
document.addEventListener('touchstart', () => {
  if (ctx && ctx.state === 'suspended') ctx.resume();
}, {once: true, passive: true});
</script>
