<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0e1f33"/>
      <stop offset="100%" stop-color="#060f1a"/>
    </linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#091624"/>
      <stop offset="100%" stop-color="#030b14"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Body -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>
  <rect width="512" height="512" rx="88" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- LCD Screen -->
  <rect x="32" y="30" width="448" height="64" rx="10" fill="url(#scr)" stroke="rgba(40,110,160,0.35)" stroke-width="1.5"/>
  <text x="256" y="76" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="38" font-weight="bold" fill="#d8c890" letter-spacing="7">BCT-404</text>
  <!-- REC dot -->
  <circle cx="460" cy="42" r="6" fill="#cc2020"/>
  <circle cx="460" cy="42" r="3" fill="#ff4444"/>

  <!-- 4×4 Pad Grid
       cols x = 32, 146, 260, 374  (w=104, last=106, gap=10)
       rows y = 108, 202, 296, 390  (h=84, gap=10) -->

  <!-- Row 0: chord pads — blue family -->
  <rect x="32"  y="108" width="104" height="84" rx="12" fill="#1840b4"/>
  <rect x="146" y="108" width="104" height="84" rx="12" fill="#2050d8"/>
  <rect x="260" y="108" width="104" height="84" rx="12" fill="#2a5cff"/>
  <rect x="374" y="108" width="106" height="84" rx="12" fill="#1840b4"/>

  <!-- Row 1: chord pads — one pad "active" (glowing) -->
  <rect x="32"  y="202" width="104" height="84" rx="12" fill="#2050d8"/>
  <rect x="146" y="202" width="104" height="84" rx="12" fill="#1840b4"/>
  <!-- Active pad -->
  <rect x="260" y="202" width="104" height="84" rx="12" fill="#6090ff" filter="url(#glow)"/>
  <rect x="374" y="202" width="106" height="84" rx="12" fill="#2a5cff"/>

  <!-- Row 2: FX pads — purple -->
  <rect x="32"  y="296" width="104" height="84" rx="12" fill="#6a28a0"/>
  <rect x="146" y="296" width="104" height="84" rx="12" fill="#8e44ad"/>
  <rect x="260" y="296" width="104" height="84" rx="12" fill="#8e44ad"/>
  <rect x="374" y="296" width="106" height="84" rx="12" fill="#6a28a0"/>

  <!-- Row 3: drum pads — red (kick/snare) + green (hi-hats) -->
  <rect x="32"  y="390" width="104" height="84" rx="12" fill="#b02020"/>
  <rect x="146" y="390" width="104" height="84" rx="12" fill="#d83030"/>
  <rect x="260" y="390" width="104" height="84" rx="12" fill="#1c9040"/>
  <rect x="374" y="390" width="106" height="84" rx="12" fill="#1c9040"/>

  <!-- Sheens: top-gloss on every pad -->
  <rect x="32"  y="108" width="104" height="30" rx="12" fill="rgba(255,255,255,0.20)"/>
  <rect x="146" y="108" width="104" height="30" rx="12" fill="rgba(255,255,255,0.20)"/>
  <rect x="260" y="108" width="104" height="30" rx="12" fill="rgba(255,255,255,0.20)"/>
  <rect x="374" y="108" width="106" height="30" rx="12" fill="rgba(255,255,255,0.20)"/>

  <rect x="32"  y="202" width="104" height="30" rx="12" fill="rgba(255,255,255,0.16)"/>
  <rect x="146" y="202" width="104" height="30" rx="12" fill="rgba(255,255,255,0.16)"/>
  <rect x="260" y="202" width="104" height="30" rx="12" fill="rgba(255,255,255,0.45)"/>
  <rect x="374" y="202" width="106" height="30" rx="12" fill="rgba(255,255,255,0.16)"/>

  <rect x="32"  y="296" width="104" height="30" rx="12" fill="rgba(255,255,255,0.18)"/>
  <rect x="146" y="296" width="104" height="30" rx="12" fill="rgba(255,255,255,0.18)"/>
  <rect x="260" y="296" width="104" height="30" rx="12" fill="rgba(255,255,255,0.18)"/>
  <rect x="374" y="296" width="106" height="30" rx="12" fill="rgba(255,255,255,0.18)"/>

  <rect x="32"  y="390" width="104" height="30" rx="12" fill="rgba(255,255,255,0.18)"/>
  <rect x="146" y="390" width="104" height="30" rx="12" fill="rgba(255,255,255,0.18)"/>
  <rect x="260" y="390" width="104" height="30" rx="12" fill="rgba(255,255,255,0.18)"/>
  <rect x="374" y="390" width="106" height="30" rx="12" fill="rgba(255,255,255,0.18)"/>
</svg>
